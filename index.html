function StaffTasksPanel(p){
  var s=p.staff;
  var today=new Date().toISOString().slice(0,10);
  var[tasks,setTasks]=useState(function(){return TASKS.filter(function(t){return t.assignedTo===s.name;});});
  var[filter,setFilter]=useState("open");

  function refresh(){setTasks(TASKS.filter(function(t){return t.assignedTo===s.name;}));}
  function done(id){updateTask(id,{status:"done",doneAt:today});refresh();p.toast("משימה הושלמה");}
  function reopen(id){updateTask(id,{status:"open"});refresh();}

  var shown=tasks.filter(function(t){return filter==="all"?true:t.status===filter;})
    .sort(function(a,b){
      if(a.status==="open"&&b.status!=="open")return -1;
      if(b.status==="open"&&a.status!=="open")return 1;
      return a.dueDate.localeCompare(b.dueDate);
    });

  var openCount=tasks.filter(function(t){return t.status==="open";}).length;
  var lateCount=tasks.filter(function(t){return t.status==="open"&&t.dueDate<today;}).length;
  var doneCount=tasks.filter(function(t){return t.status==="done";}).length;

  var prioColor=function(pr){if(pr==="high")return RED;if(pr==="medium")return AMB;return GRN;};
  var prioLabel=function(pr){if(pr==="high")return "דחוף";if(pr==="medium")return "רגיל";return "נמוך";};
  var catLabel=function(c){if(c==="taxAuth")return "מ.ה.";if(c==="nii")return "ב.ל.";if(c==="internal")return "פנימי";return "לקוח";};
  var catColor=function(c){if(c==="taxAuth")return "amber";if(c==="nii")return "red";if(c==="internal")return "gray";return "blue";};

  return(
    <div style={{padding:20}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
        {[[openCount,"פתוחות","blue"],[lateCount,"באיחור","red"],[doneCount,"הושלמו","green"]].map(function(st){
          return <div key={st[1]} style={{background:BG,borderRadius:9,padding:"10px 14px",textAlign:"center",border:"1px solid "+(st[2]==="red"&&st[0]>0?RED+"44":BDR)}}>
            <p style={{fontSize:20,fontWeight:800,color:st[2]==="blue"?ACC:st[2]==="red"?(st[0]>0?RED:MUT):GRN}}>{st[0]}</p>
            <p style={{fontSize:11,color:MUT,marginTop:2}}>{st[1]}</p>
          </div>;
        })}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[["open","פתוחות"],["done","הושלמו"],["all","הכל"]].map(function(f){
          var a=filter===f[0];
          return <button key={f[0]} onClick={function(){setFilter(f[0]);}} style={{padding:"5px 12px",borderRadius:7,fontSize:12,background:a?ACCLO:SURF,border:"1px solid "+(a?ACC:BDR),color:a?ACC:MUT,cursor:"pointer"}}>{f[1]}</button>;
        })}
      </div>
      {shown.length===0
        ?<div style={{textAlign:"center",padding:28,color:MUT}}><p style={{fontSize:28}}>{"✓"}</p><p style={{fontSize:13,marginTop:6}}>{filter==="open"?"אין משימות פתוחות עבור "+s.name:"אין משימות"}</p></div>
        :<div style={{display:"flex",flexDirection:"column",gap:8}}>
          {shown.map(function(t){
            var isLate=t.status==="open"&&t.dueDate<today;
            var isDone=t.status==="done";
            var client=t.clientId?CLIENTS.find(function(c){return c.id===t.clientId;}):null;
            return(
              <div key={t.id} style={{background:BG,border:"1px solid "+(isLate?RED+"44":isDone?GRN+"22":BDR),borderRadius:10,padding:"12px 14px",display:"flex",gap:10,alignItems:"flex-start",opacity:isDone?0.55:1}}>
                <button onClick={function(){if(isDone)reopen(t.id);else done(t.id);}}
                  style={{width:20,height:20,borderRadius:"50%",border:"2px solid "+(isDone?GRN:isLate?RED:BDR),background:isDone?GRN:"transparent",flexShrink:0,cursor:"pointer",marginTop:2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:700}}>
                  {isDone?"✓":""}
                </button>
                <div style={{flex:1}}>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:3}}>
                    <span style={{fontSize:13,fontWeight:isDone?400:700,color:isDone?MUT:isLate?RED:TXT,textDecoration:isDone?"line-through":"none"}}>{t.title}</span>
                  {t.isAuto&&<span style={{fontSize:10,background:"rgba(139,92,246,0.15)",color:"#8b5cf6",border:"1px solid rgba(139,92,246,0.3)",borderRadius:999,padding:"1px 7px",fontWeight:700,flexShrink:0}}>{"⚡"}</span>}
                    {t.isAuto&&<span style={{fontSize:10,background:"rgba(139,92,246,0.15)",color:"#8b5cf6",border:"1px solid rgba(139,92,246,0.3)",borderRadius:999,padding:"1px 7px",fontWeight:700,flexShrink:0}}>{"⚡ אוטו"}</span>}
                    <Bdg color={isDone?"gray":isLate?"red":t.priority==="high"?"red":t.priority==="medium"?"amber":"green"} sm>{isDone?"הושלם":isLate?"באיחור":prioLabel(t.priority)}</Bdg>
                    <Bdg color={catColor(t.category)} sm>{catLabel(t.category)}</Bdg>
                    {client&&<span style={{fontSize:11,background:ACCLO,color:ACC,padding:"1px 7px",borderRadius:999}}>{client.name}</span>}
                  </div>
                  {t.desc&&<p style={{fontSize:11,color:MUT,marginBottom:3}}>{t.desc}</p>}
                  <p style={{fontSize:11,color:isLate?RED:MUT}}>{(isLate?"⚠ ":"")+"יעד: "+t.dueDate+(t.doneAt?" | הושלם: "+t.doneAt:"")}</p>
                </div>
              </div>
            );
          })}
        </div>
      }
    </div>
  );
}

function StaffView(p){
  var[staff,setStaff]=useState(function(){return STAFF.slice();});
  var[showAdd,setShowAdd]=useState(false);
  var[editId,setEditId]=useState(null);
  var[nm,setNm]=useState("");
  var[role,setRole]=useState("עו-ד");
  var[err,setErr]=useState("");
  var[taskStaff,setTaskStaff]=useState(null);

  function startEdit(s){setEditId(s.id);setNm(s.name);setRole(s.role);setShowAdd(false);}
  function cancelEdit(){setEditId(null);setNm("");setRole("עו-ד");setErr("");}

  function saveEdit(id){
    if(!nm.trim()){setErr("שם חובה");return;}
    for(var i=0;i<STAFF.length;i++){if(STAFF[i].id===id){STAFF[i].name=nm.trim();STAFF[i].role=role;break;}}
    if(id===ACTIVE_USER.name||true) ACTIVE_USER.name=STAFF.find(function(s){return s.role==="שותף";})&&STAFF.find(function(s){return s.role==="שותף";}).name||ACTIVE_USER.name;
    setStaff(STAFF.slice());
    cancelEdit();
    p.toast("עובד עודכן");
  }

  function addStaff(){
    if(!nm.trim()){setErr("שם חובה");return;}
    var newS={id:Date.now(),name:nm.trim(),role:role};
    STAFF.push(newS);
    setStaff(STAFF.slice());
    setNm("");setRole("עו-ד");setErr("");setShowAdd(false);
    p.toast("עובד נוסף: "+newS.name);
  }

  function removeStaff(id){
    var idx=-1;
    for(var i=0;i<STAFF.length;i++){if(STAFF[i].id===id){idx=i;break;}}
    if(idx>=0)STAFF.splice(idx,1);
    setStaff(STAFF.slice());
    p.toast("עובד הוסר");
  }

  var ROLES=["שותף","עו-ד","עו-ד מתמחה","רו-ח","יועץ","מזכירה","מנהל","סטודנט"];
  var roleColor=function(r){if(r==="שותף")return "amber";if(r==="עו-ד")return "blue";if(r==="רו-ח")return "green";return "gray";};

  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div><h1 style={{fontSize:21,fontWeight:800,color:TXT}}>{"ניהול עובדים"}</h1><p style={{fontSize:13,color:MUT,marginTop:3}}>{"הוספה, עריכה וניהול צוות המשרד"}</p></div>
        <button onClick={function(){setShowAdd(true);setEditId(null);setNm("");setRole("עו-ד");}} style={{background:"linear-gradient(135deg,"+ACCLO+","+ACC+")",border:"none",borderRadius:9,padding:"9px 18px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>{"+ הוסף עובד"}</button>
      </div>
      {(showAdd||editId)&&(
        <div style={{background:CARD,border:"1px solid "+BDR,borderRadius:12,padding:20,marginBottom:16}}>
          <p style={{fontSize:14,fontWeight:700,color:editId?"amber":ACC,marginBottom:14}}>{editId?"עריכת עובד":"הוספת עובד חדש"}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"}}>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:13,color:MUT,display:"block",marginBottom:5}}>{"שם מלא *"}</label>
              <input value={nm} onChange={function(e){setNm(e.target.value);setErr("");}} placeholder="שם העובד"
                style={{width:"100%",background:BG,border:"1px solid "+(err?RED:BDR),borderRadius:9,padding:"11px 14px",color:TXT,fontSize:14,fontFamily:"inherit",outline:"none"}}/>
              {err&&<p style={{fontSize:12,color:RED,marginTop:3}}>{err}</p>}
            </div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:13,color:MUT,display:"block",marginBottom:5}}>{"תפקיד"}</label>
              <select value={role} onChange={function(e){setRole(e.target.value);}}
                style={{width:"100%",background:BG,border:"1px solid "+BDR,borderRadius:9,padding:"11px 14px",color:TXT,fontSize:14,fontFamily:"inherit"}}>
                {ROLES.map(function(r){return <option key={r} value={r}>{r}</option>;})}
              </select>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={function(){if(editId){cancelEdit();setShowAdd(false);}else{setShowAdd(false);setNm("");setErr("");}}} style={{background:SUB,border:"1px solid "+BDR,borderRadius:8,padding:"8px 16px",color:MUT,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{"ביטול"}</button>
            {editId?<button onClick={function(){saveEdit(editId);}} style={{background:AMB,border:"none",borderRadius:8,padding:"8px 18px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>{"שמור שינויים"}</button>
                   :<button onClick={addStaff} style={{background:ACC,border:"none",borderRadius:8,padding:"8px 18px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>{"הוסף"}</button>}
          </div>
        </div>
      )}
      <div style={{background:CARD,border:"1px solid "+BDR,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 18px",borderBottom:"1px solid "+BDR,display:"flex",justifyContent:"space-between"}}>
          <p style={{fontWeight:700,color:TXT,fontSize:14}}>{"צוות המשרד"}</p>
          <span style={{fontSize:13,color:MUT}}>{staff.length+" עובדים"}</span>
        </div>
        {staff.length===0?<p style={{color:MUT,textAlign:"center",padding:32}}>{"אין עובדים"}</p>:(
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:BG}}>{["שם","תפקיד","שעות סה-כ","לקוחות פעילים","משימות",""].map(function(h){return <th key={h} style={{padding:"9px 16px",textAlign:"right",fontSize:12,color:MUT}}>{h}</th>;})}</tr></thead>
            <tbody>
              {staff.map(function(s){
                var totalH=Object.keys(HOURS).reduce(function(sum,cid){return sum+(HOURS[cid]||[]).filter(function(r){return r.staffId===s.id;}).reduce(function(a,r){return a+r.hours;},0);},0);
                var activeClients=Object.keys(HOURS).filter(function(cid){return (HOURS[cid]||[]).some(function(r){return r.staffId===s.id;});}).length;
                return(
                  <tr key={s.id} style={{borderBottom:"1px solid "+BDR}}>
                    <td style={{padding:"12px 16px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:34,height:34,borderRadius:9,background:ACCLO,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:ACC}}>{s.name[0]}</div>
                        <span style={{fontWeight:700,color:TXT,fontSize:14}}>{s.name}</span>
                      </div>
                    </td>
                    <td style={{padding:"12px 16px"}}><Bdg color={roleColor(s.role)} sm>{s.role}</Bdg></td>
                    <td style={{padding:"12px 16px",fontSize:14,fontWeight:700,color:ACC}}>{totalH+"ש"}</td>
                    <td style={{padding:"12px 16px",fontSize:13,color:MUT}}>{activeClients}</td>
                    <td style={{padding:"12px 16px"}}>{(function(){
                      var sTasks=TASKS.filter(function(t){return t.status==="open"&&t.assignedTo===s.name;});
                      var late=sTasks.filter(function(t){return t.dueDate<new Date().toISOString().slice(0,10);}).length;
                      return sTasks.length===0
                        ?<span style={{fontSize:12,color:MUT}}>{"אין"}</span>
                        :<button onClick={function(){setTaskStaff(s);}} style={{background:late>0?REDLO:ACCLO,border:"1px solid "+(late>0?RED+"44":ACC+"44"),borderRadius:7,padding:"4px 11px",fontSize:12,fontWeight:700,color:late>0?RED:ACC,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                            <span>{sTasks.length+" משימות"}</span>
                            {late>0&&<span style={{background:RED,color:"#fff",borderRadius:999,fontSize:10,padding:"1px 5px"}}>{late+" באיחור"}</span>}
                          </button>;
                    })()}</td>
                    <td style={{padding:"12px 16px"}}>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={function(){startEdit(s);}} style={{background:ACCLO,border:"1px solid "+ACC+"44",color:ACC,padding:"5px 12px",borderRadius:7,fontSize:12,cursor:"pointer",fontWeight:600}}>{"ערוך"}</button>

// ---- Filings Tracker View ----
function FilingsView(p){
  var[selClient,setSelClient]=useState(null);
  var[year,setYear]=useState(String(new Date().getFullYear()));
  var[filings,setFilings]=useState([]);
  var[editSettings,setEditSettings]=useState(false);
  var[settings,setSettings]=useState({vatFreq:"monthly",taxAdv:false,taxDeduct:false,niiDeduct:false});
  var[filterType,setFilterType]=useState("all");
  var[sortKey,setSortKey]=useState("period");
  var[sortDir,setSortDir]=useState(1);

  function loadClient(c){
    setSelClient(c);
    var s=getFilingSettings(c.id);
    setSettings({vatFreq:s.vatFreq||"monthly",taxAdvEnabled:s.taxAdvEnabled||false,taxAdvFreq:s.taxAdvFreq||"monthly",taxDeductEnabled:s.taxDeductEnabled||false,taxDeductFreq:s.taxDeductFreq||"monthly",niiDeductEnabled:s.niiDeductEnabled||false,niiDeductFreq:s.niiDeductFreq||"monthly"});
    var existing=getFilings(c.id);
    if(existing.length===0){
      var gen=generateFilingSchedule(c.id,Number(year));
      FILINGS[c.id]=gen;
      setFilings(gen.slice());
    } else {
      setFilings(existing.slice());
    }
  }

  function saveSettings(){
    FILING_SETTINGS[selClient.id]=settings;
    var gen=generateFilingSchedule(selClient.id,Number(year));
    // merge: keep existing filed statuses
    var existing=FILINGS[selClient.id]||[];
    var existMap={};existing.forEach(function(e){existMap[e.id]=e;});
    var merged=gen.map(function(f){return existMap[f.id]||f;});
    FILINGS[selClient.id]=merged;
    setFilings(merged.slice());
    setEditSettings(false);
    p.toast("הגדרות הגשות עודכנו");
  }

  function regen(){
    if(!selClient)return;
    var gen=generateFilingSchedule(selClient.id,Number(year));
    var existing=FILINGS[selClient.id]||[];
    var existMap={};existing.forEach(function(e){existMap[e.id]=e;});
    var merged=gen.map(function(f){return existMap[f.id]||f;});
    FILINGS[selClient.id]=merged;
    setFilings(merged.slice());
  }

  function markFiled(id){
    var arr=FILINGS[selClient.id]||[];
    for(var i=0;i<arr.length;i++){if(arr[i].id===id){arr[i].status="filed";arr[i].filedDate=new Date().toISOString().slice(0,10);break;}}
    setFilings(arr.slice());
    logAct(selClient.id,ACTIVE_USER.name,"הגשה בוצעה",id);
    p.toast("הגשה סומנה כבוצעה");
  }

  function markLate(id){
    var arr=FILINGS[selClient.id]||[];
    for(var i=0;i<arr.length;i++){if(arr[i].id===id){arr[i].status="late";break;}}
    setFilings(arr.slice());
    p.toast("סומן כמאוחר");
  }

  function markPending(id){
    var arr=FILINGS[selClient.id]||[];
    for(var i=0;i<arr.length;i++){if(arr[i].id===id){arr[i].status="ממתין";arr[i].filedDate="";break;}}
    setFilings(arr.slice());
  }

  var today=new Date().toISOString().slice(0,10);
  var shown=filterType==="all"?filings:filings.filter(function(f){return f.type===filterType;});
  var pending=filings.filter(function(f){return f.status==="ממתין";}).length;

// ---- Reports View ----
function ReportsView(p){
  var[reportType,setReportType]=useState("hours-by-staff");
  var[fromDate,setFromDate]=useState(new Date().getFullYear()+"-01-01");
  var[toDate,setToDate]=useState(new Date().toISOString().slice(0,10));

  // Build hours-by-staff report
  function hoursbyStaffReport(){
    var rows=[];
    STAFF.forEach(function(s){
      var allHours=[];
      Object.keys(HOURS).forEach(function(cid){
        (HOURS[cid]||[]).forEach(function(r){
          if(r.staffId===s.id&&r.date>=fromDate&&r.date<=toDate)allHours.push({cid:cid,hours:r.hours,date:r.date,note:r.note});
        });
      });
      if(allHours.length>0){
        var total=allHours.reduce(function(a,r){return a+r.hours;},0);
        var byClient={};
        allHours.forEach(function(r){if(!byClient[r.cid])byClient[r.cid]=0;byClient[r.cid]+=r.hours;});
        rows.push({staff:s,total:total,byClient:byClient,entries:allHours.length});
      }
    });
    return rows.sort(function(a,b){return b.total-a.total;});
  }

  // Build hours-by-client report
  function hoursByClientReport(){
    var rows=[];
    CLIENTS.forEach(function(c){
      var allHours=(HOURS[c.id]||[]).filter(function(r){return r.date>=fromDate&&r.date<=toDate;});
      if(allHours.length>0){
        var total=allHours.reduce(function(a,r){return a+r.hours;},0);
        var byStaff={};
        allHours.forEach(function(r){if(!byStaff[r.staffName])byStaff[r.staffName]=0;byStaff[r.staffName]+=r.hours;});
        rows.push({client:c,total:total,byStaff:byStaff,entries:allHours.length});
      }
    });
    return rows.sort(function(a,b){return b.total-a.total;});
  }

  // Build filings status report
  function filingsReport(){
    var rows=[];
    CLIENTS.filter(function(c){return c.status==="פעיל";}).forEach(function(c){
      var f=FILINGS[c.id]||[];
      var today=new Date().toISOString().slice(0,10);
      var filed=f.filter(function(x){return x.status==="filed";}).length;
      var pending=f.filter(function(x){return x.status==="ממתין";}).length;
      var late=f.filter(function(x){return x.status==="late"||(x.status==="ממתין"&&x.due<today);}).length;
      if(f.length>0)rows.push({client:c,filed:filed,pending:pending,late:late,total:f.length});
    });
    return rows;
  }

  function downloadTxt(text,filename){
    var blob=new Blob([text],{type:"text/plain;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var link=window.document.createElement("a");
    link.href=url;link.download=filename;link.click();
    URL.revokeObjectURL(url);
  }

  function exportCurrentReport(){
    var lines=["LexDoc - דוח","=".repeat(50),"תאריך: "+new Date().toLocaleDateString("he-IL"),"תקופה: "+fromDate+" עד "+toDate,""];
    if(reportType==="hours-by-staff"){
      lines.push("דוח שעות לפי עובד","=".repeat(50),"");
      hoursbyStaffReport().forEach(function(r){
        lines.push("עובד: "+r.staff.name+" ("+r.staff.role+")");
        lines.push("סהכ שעות: "+r.total+"ש | רשומות: "+r.entries);
        Object.keys(r.byClient).forEach(function(cid){
          var c=CLIENTS.find(function(x){return String(x.id)===String(cid);});
          lines.push("  "+((c&&c.name)||"לקוח "+cid)+": "+r.byClient[cid]+"ש");
        });
        lines.push("");
      });
    } else if(reportType==="hours-by-client"){
      lines.push("דוח שעות לפי לקוח","=".repeat(50),"");
      hoursByClientReport().forEach(function(r){
        lines.push("לקוח: "+r.client.name+" ("+r.client.caseNum+")");
        lines.push("סהכ שעות: "+r.total+"ש | רשומות: "+r.entries);
        Object.keys(r.byStaff).forEach(function(nm){lines.push("  "+nm+": "+r.byStaff[nm]+"ש");});
        lines.push("");
      });
    } else {
      lines.push("דוח הגשות","=".repeat(50),"");
      filingsReport().forEach(function(r){
        lines.push("לקוח: "+r.client.name);
        lines.push("הוגש: "+r.filed+" | ממתין: "+r.pending+" | באיחור: "+r.late+" | סהכ: "+r.total);
        lines.push("");
      });
    }
    downloadTxt(lines.join("\n"),"lexdoc-report-"+reportType+"-"+fromDate+".txt");
    p.toast("דוח יוצא");
  }

  var REPORT_TYPES=[["hours-by-staff","שעות לפי עובד"],["hours-by-client","שעות לפי לקוח"],["filings","דוח הגשות"]];

  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div><h1 style={{fontSize:21,fontWeight:800,color:TXT}}>{"דוחות"}</h1><p style={{fontSize:13,color:MUT,marginTop:3}}>{"ניתוח שעות עבודה והגשות"}</p></div>
        <button onClick={exportCurrentReport} style={{background:"linear-gradient(135deg,"+GRNLO+","+GRN+")",border:"none",borderRadius:9,padding:"9px 18px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>{"ייצוא דוח"}</button>

// ---- Backup View ----
function BackupView(p){
  var firm=p.firm;
  var[saving,setSaving]=useState(false);
  var[restoring,setRestoring]=useState(false);
  var[msg,setMsg]=useState("");
  var fileRef=useRef(null);

  function doBackup(){
    setSaving(true);
    var bak=buildBackup(firm);
    var json=JSON.stringify(bak,null,2);
    var blob=new Blob([json],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var link=window.document.createElement("a");
    link.href=url;
    var dt=new Date().toISOString().slice(0,10).replace(/-/g,"");
    link.download="lexdoc-backup-"+dt+".bak";
    link.click();
    URL.revokeObjectURL(url);
    setSaving(false);
    setMsg("גיבוי הורד: lexdoc-backup-"+dt+".bak");
    p.toast("גיבוי הורד");
  }

  function handleRestoreFile(e){
    var file=e.target.files&&e.target.files[0];
    if(!file)return;
    setRestoring(true);
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var bak=JSON.parse(ev.target.result);
        var restoredFirm=restoreBackup(bak);
        if(restoredFirm){
          setMsg("שחזור הצליח! "+bak.ts+" | "+Object.keys(bak.clients||[]).length+" לקוחות");
          p.toast("שחזור הושלם");
          if(restoredFirm&&restoredFirm.firmName){window.location.reload&&window.location.reload();}
        } else {
          setMsg("שחזור נכשל - קובץ לא תקין");
        }
      }catch(err){setMsg("שגיאה בקריאת הקובץ: "+err.message);}
      setRestoring(false);
    };
    reader.readAsText(file);
  }

  // Storage usage estimate
  var storageEstimate=0;
  try{
    var bak2=buildBackup(firm);
    storageEstimate=JSON.stringify(bak2).length;
    var storageStats=getStorageStats();
  }catch(e){}

  return(
    <div className="fade">
      <div style={{marginBottom:20}}>
        <h1 style={{fontSize:21,fontWeight:800,color:TXT}}>{"גיבוי ושחזור"}</h1>
        <p style={{fontSize:13,color:MUT,marginTop:3}}>{"גיבוי וייצוא כל נתוני המשרד"}</p>
      </div>
      {msg&&(
        <div style={{background:GRNLO,border:"1px solid "+GRN+"33",borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:13,color:GRN,fontWeight:600}}>{msg}</div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <div style={{background:CARD,border:"1px solid "+BDR,borderRadius:12,padding:24}}>
          <div style={{width:48,height:48,borderRadius:12,background:"linear-gradient(135deg,"+ACCLO+","+ACC+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,marginBottom:14}}>{"[g]"}</div>
          <h2 style={{fontSize:16,fontWeight:800,color:TXT,marginBottom:6}}>{"גיבוי נתונים"}</h2>
          <p style={{fontSize:13,color:MUT,marginBottom:16}}>{"יוצר קובץ .BAK עם כל הנתונים: לקוחות, שעות, חשבוניות, הגשות"}</p>
          <div style={{background:SUB,borderRadius:8,padding:"8px 12px",marginBottom:16,fontSize:12,color:MUT}}>
            <p>{"גודל משוער: "+(Math.round(storageEstimate/1024*10)/10)+"KB"}</p>
            <p style={{marginTop:3}}>{"לקוחות: "+CLIENTS.length+" | עובדים: "+STAFF.length}</p>
          </div>
          <button onClick={doBackup} disabled={saving}
            style={{background:"linear-gradient(135deg,"+ACCLO+","+ACC+")",border:"none",borderRadius:9,padding:"11px 20px",color:"#fff",fontWeight:700,fontSize:14,cursor:saving?"wait":"pointer",width:"100%",fontFamily:"inherit"}}>
            {saving?"יוצר גיבוי...":"הורד גיבוי (.BAK)"}
          </button>
        </div>
        <div style={{background:CARD,border:"1px solid "+BDR,borderRadius:12,padding:24}}>
          <div style={{width:48,height:48,borderRadius:12,background:"linear-gradient(135deg,"+AMBLO+","+AMB+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,marginBottom:14}}>{"[r]"}</div>
          <h2 style={{fontSize:16,fontWeight:800,color:TXT,marginBottom:6}}>{"שחזור נתונים"}</h2>
          <p style={{fontSize:13,color:MUT,marginBottom:16}}>{"טעינת קובץ .BAK לשחזור נתונים. נתונים קיימים יתאחדו עם הגיבוי"}</p>
          <div style={{background:AMBLO,border:"1px solid "+AMB+"33",borderRadius:8,padding:"8px 12px",marginBottom:16,fontSize:12,color:AMB}}>
            {"שים לב: שחזור ימזג נתונים. מומלץ לגבות לפני שחזור."}
          </div>
          <input ref={fileRef} type="file" accept=".bak,.json" onChange={handleRestoreFile} style={{display:"none"}}/>
          <button onClick={function(){if(fileRef.current)fileRef.current.click();}} disabled={restoring}
            style={{background:"linear-gradient(135deg,"+AMBLO+","+AMB+")",border:"none",borderRadius:9,padding:"11px 20px",color:"#fff",fontWeight:700,fontSize:14,cursor:restoring?"wait":"pointer",width:"100%",fontFamily:"inherit"}}>
            {restoring?"משחזר...":"טען קובץ גיבוי (.BAK)"}
          </button>
        </div>
      </div>
      <div style={{background:CARD,border:"1px solid "+BDR,borderRadius:12,padding:20}}>
        <h2 style={{fontSize:14,fontWeight:700,color:TXT,marginBottom:12}}>{"אחסון ונפח"}</h2>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          {[["לקוחות",CLIENTS.length,"פעיל"],["עובדים",STAFF.length,"פעיל"],["שעות רשומות",Object.values(HOURS).reduce(function(s,a){return s+a.length;},0),"רשומות"],["חשבוניות",Object.values(INVOICES).reduce(function(s,a){return s+a.length;},0),"רשומות"]].map(function(item){
            return(
              <div key={item[0]} style={{background:BG,borderRadius:9,padding:"12px 14px"}}>
                <p style={{fontSize:20,fontWeight:800,color:ACC}}>{item[1]}</p>
                <p style={{fontSize:12,color:MUT,marginTop:2}}>{item[0]}</p>
              </div>
            );
          })}
        </div>
        <div style={{marginTop:14,background:SUB,borderRadius:8,padding:"10px 14px",fontSize:12,color:MUT}}>
          {(function(){var s=getStorageStats();return "נפח שימוש: "+s.usedKB+"KB ("+s.usedMB+"MB) | "+s.pct+"% מתוך 4.5MB | סטטוס: "+(s.status==="ok"?"✅ תקין":s.status==="warning"?"⚠ קרוב למגבלה":"🔴 קריטי");})()}
          <div style={{background:BDR,borderRadius:999,height:6,marginTop:6,overflow:"hidden"}}>
            {(function(){var s=getStorageStats();return <div style={{width:Math.min(100,s.pct)+"%",height:"100%",background:s.status==="critical"?RED:s.status==="warning"?AMB:ACC,borderRadius:999}}/>;})()}
          </div>
        </div>
      </div>
    </div>
  );
}

// ====== TASKS PANEL ======
function TasksPanel(p){
  var[tasks,setTasks]=useState(function(){return TASKS.slice();});
  var[showAdd,setShowAdd]=useState(false);
  var[filterStatus,setFilterStatus]=useState("open");
  var[filterClient,setFilterClient]=useState("all");
  var[filterPriority,setFilterPriority]=useState("all");
  var[title,setTitle]=useState("");
  var[desc,setDesc]=useState("");
  var[dueDate,setDueDate]=useState(new Date().toISOString().slice(0,10));
  var[priority,setPriority]=useState("medium");
  var[taskClient,setTaskClient]=useState("");
  var[category,setCategory]=useState("client");
  var[assignedTo,setAssignedTo]=useState("");
  var[err,setErr]=useState("");

  function refresh(){setTasks(TASKS.slice());}

  function save(){
    if(!title.trim()){setErr("כותרת חובה");return;}
    addTask({
      clientId:taskClient?Number(taskClient):null,
      title:title.trim(),desc:desc.trim(),dueDate:dueDate,
      priority:priority,status:"open",assignedTo:assignedTo||ACTIVE_USER.name,
      category:category,
    });
    setTitle("");setDesc("");setPriority("medium");setTaskClient("");setCategory("client");setAssignedTo("");setErr("");
    setShowAdd(false);refresh();
    p.toast("משימה נוספה");
  }

  function done(id){updateTask(id,{status:"done",doneAt:new Date().toISOString().slice(0,10)});refresh();p.toast("משימה הושלמה");}
  function cancel(id){updateTask(id,{status:"cancelled"});refresh();}
  function reopen(id){updateTask(id,{status:"open"});refresh();}

  var today=new Date().toISOString().slice(0,10);
  var shown=tasks.filter(function(t){
    if(filterStatus==="auto")return t.isAuto&&t.status==="open";
    if(filterStatus!=="all"&&t.status!==filterStatus)return false;
    if(filterClient!=="all"&&String(t.clientId)!==filterClient)return false;
    if(filterPriority!=="all"&&t.priority!==filterPriority)return false;
    return true;
  }).sort(function(a,b){
    var po={high:0,medium:1,low:2};
    if(a.status==="open"&&b.status!=="open")return -1;
    if(b.status==="open"&&a.status!=="open")return 1;
    return (po[a.priority]||1)-(po[b.priority]||1)||a.dueDate.localeCompare(b.dueDate);
  });

  var overdue=tasks.filter(function(t){return t.status==="open"&&t.dueDate<today;}).length;
  var openCount=tasks.filter(function(t){return t.status==="open";}).length;
  var doneCount=tasks.filter(function(t){return t.status==="done";}).length;
  var autoCount=tasks.filter(function(t){return t.status==="open"&&t.isAuto;}).length;

  var prioColor=function(pr){if(pr==="high")return RED;if(pr==="medium")return AMB;return GRN;};
  var prioBg=function(pr){if(pr==="high")return REDLO;if(pr==="medium")return AMBLO;return GRNLO;};
  var prioLabel=function(pr){if(pr==="high")return "דחוף";if(pr==="medium")return "רגיל";return "נמוך";};
  var catLabel=function(c){if(c==="taxAuth")return "מס הכנסה";if(c==="nii")return "ביטוח לאומי";if(c==="internal")return "פנימי";return "לקוח";};
  var catColor=function(c){if(c==="taxAuth")return "amber";if(c==="nii")return "red";if(c==="internal")return "gray";return "blue";};

  var CATEGORIES=[["client","לקוח"],["taxAuth","מס הכנסה"],["nii","ביטוח לאומי"],["internal","פנימי"]];

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
        {[[openCount,"פתוחות","blue"],[overdue,"באיחור","red"],[doneCount,"הושלמו","green"],[tasks.length,"סה-כ","gray"]].map(function(s){
          return <div key={s[1]} style={{background:CARD,border:"1px solid "+(s[2]==="red"&&s[0]>0?RED+"44":BDR),borderRadius:10,padding:"12px 16px",textAlign:"center"}}>
            <p style={{fontSize:22,fontWeight:800,color:s[2]==="blue"?ACC:s[2]==="red"?(s[0]>0?RED:MUT):s[2]==="green"?GRN:MUT}}>{s[0]}</p>
            <p style={{fontSize:12,color:MUT,marginTop:2}}>{s[1]}</p>
          </div>;
        })}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",justifyContent:"space-between"}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[["open","פתוחות"],["done","הושלמו"],["auto","⚡ אוטומטי"],["all","הכל"]].map(function(f){
            var a=filterStatus===f[0];var isAuto=f[0]==="auto";
            return <button key={f[0]} onClick={function(){setFilterStatus(f[0]);}}
              style={{padding:"6px 13px",borderRadius:7,fontSize:12,
                background:a?(isAuto?"rgba(139,92,246,0.15)":ACCLO):CARD,
                border:"1px solid "+(a?(isAuto?"rgba(139,92,246,0.5)":ACC):BDR),
                color:a?(isAuto?"#8b5cf6":ACC):MUT,cursor:"pointer",fontWeight:a?700:400}}>{f[1]}</button>;
          })}
          {[["all","כל עדיפות"],["high","דחוף"],["medium","רגיל"],["low","נמוך"]].map(function(f){var a=filterPriority===f[0];return <button key={f[0]} onClick={function(){setFilterPriority(f[0]);}} style={{padding:"6px 13px",borderRadius:7,fontSize:12,background:a?ACCLO:CARD,border:"1px solid "+(a?ACC:BDR),color:a?ACC:MUT,cursor:"pointer"}}>{f[1]}</button>;})}
        </div>
        <button onClick={function(){setShowAdd(function(x){return !x;});}} style={{background:"linear-gradient(135deg,"+ACCLO+","+ACC+")",border:"none",borderRadius:9,padding:"8px 18px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>{"+ משימה חדשה"}</button>
      </div>
      {showAdd&&(
        <div style={{background:CARD,border:"1px solid "+ACC+"44",borderRadius:12,padding:20,marginBottom:16}}>
          <p style={{fontSize:14,fontWeight:700,color:ACC,marginBottom:14}}>{"משימה חדשה"}</p>

                  {isDone?"✓":""}

                    <Bdg color={catColor(t.category)} sm>{catLabel(t.category)}</Bdg>
                    {client&&<span style={{fontSize:11,color:MUT,background:SUB,padding:"1px 8px",borderRadius:999}}>{client.name}</span>}
                  </div>
                  {t.desc&&<p style={{fontSize:12,color:MUT,marginBottom:4}}>{t.desc}</p>}
                  <div style={{display:"flex",gap:12,fontSize:11,color:MUT}}>
                    <span>{isLate?"⚠ ":""}{"יעד: "+t.dueDate}</span>

                    {t.doneAt&&<span>{"הושלם: "+t.doneAt}</span>}
                  </div>
                </div>
                {!isDone&&<button onClick={function(){cancel(t.id);}} style={{background:"none",border:"none",color:MUT,cursor:"pointer",fontSize:15,padding:"0 4px"}}>{"×"}</button>}
              </div>
            );
          })}
        </div>
      }
    </div>
  );
}

function ClientTasksWidget(p){
  var c=p.client;
  var[tasks,setTasks]=useState(function(){return getTasks(c.id);});
  var[showAdd,setShowAdd]=useState(false);
  var[title,setTitle]=useState("");
  var[dueDate,setDueDate]=useState(new Date().toISOString().slice(0,10));
  var[priority,setPriority]=useState("medium");
  var[category,setCategory]=useState("client");
  var today=new Date().toISOString().slice(0,10);

  function refresh(){setTasks(getTasks(c.id));}
  function save(){
    if(!title.trim())return;
    addTask({clientId:c.id,title:title.trim(),dueDate:dueDate,priority:priority,status:"open",assignedTo:ACTIVE_USER.name,category:category,desc:""});
    setTitle("");setPriority("medium");setCategory("client");setShowAdd(false);refresh();p.toast("משימה נוספה");
  }
  function done(id){updateTask(id,{status:"done",doneAt:today});refresh();p.toast("בוצע");}

  var open=tasks.filter(function(t){return t.status==="open";});
  var done2=tasks.filter(function(t){return t.status==="done";});
  var prioColor=function(pr){if(pr==="high")return RED;if(pr==="medium")return AMB;return GRN;};

  return(
    <div style={{marginTop:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

        </div>
        <button onClick={function(){setShowAdd(function(x){return !x;});}} style={{background:ACCLO,border:"1px solid "+ACC+"44",borderRadius:7,padding:"4px 12px",color:ACC,fontSize:12,cursor:"pointer",fontWeight:600}}>{"+ משימה"}</button>
      </div>
      {showAdd&&(
        <div style={{background:BG,border:"1px solid "+BDR,borderRadius:9,padding:14,marginBottom:10}}>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input value={title} onChange={function(e){setTitle(e.target.value);}} placeholder="כותרת המשימה" style={{flex:1,background:SURF,border:"1px solid "+BDR,borderRadius:7,padding:"8px 12px",color:TXT,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
            <input type="date" value={dueDate} onChange={function(e){setDueDate(e.target.value);}} style={{background:SURF,border:"1px solid "+BDR,borderRadius:7,padding:"8px 10px",color:TXT,fontSize:12,fontFamily:"inherit"}}/>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            {[["high","דחוף"],["medium","רגיל"],["low","נמוך"]].map(function(pr){var a=priority===pr[0];return <button key={pr[0]} onClick={function(){setPriority(pr[0]);}} style={{padding:"4px 10px",borderRadius:6,fontSize:11,background:a?prioColor(pr[0]):SUB,color:a?"#fff":MUT,border:"none",cursor:"pointer",fontWeight:a?700:400}}>{pr[1]}</button>;})}
            <span style={{color:MUT,fontSize:11,margin:"4px 4px 0"}}>|</span>
            {[["client","לקוח"],["taxAuth","מ.ה."],["nii","ב.ל."]].map(function(cat){var a=category===cat[0];return <button key={cat[0]} onClick={function(){setCategory(cat[0]);}} style={{padding:"4px 10px",borderRadius:6,fontSize:11,background:a?ACC:SUB,color:a?"#fff":MUT,border:"none",cursor:"pointer",fontWeight:a?700:400}}>{cat[1]}</button>;})}
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={function(){setShowAdd(false);setTitle("");}} style={{background:SUB,border:"none",borderRadius:6,padding:"6px 12px",color:MUT,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{"ביטול"}</button>
            <button onClick={save} style={{background:ACC,border:"none",borderRadius:6,padding:"6px 14px",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>{"הוסף"}</button>

            </div>

          </div>
        );
      })}
      {done2.length>0&&<p style={{fontSize:11,color:MUT,marginTop:8}}>{"הושלמו: "+done2.length}</p>}
    </div>
  );

// מיפוי עובד -> תפקיד (staffId -> roleId)
var STAFF_ROLES = {};
// ברירת מחדל: העובד הראשון (בעל המשרד) הוא superAdmin
function initStaffRoles(){
  if(STAFF.length>0&&!STAFF_ROLES[STAFF[0].id]){
    STAFF_ROLES[STAFF[0].id]="superAdmin";
  }
}

function getStaffRole(staffId){
  initStaffRoles();
  return STAFF_ROLES[staffId]||"staff";
}
function setStaffRole(staffId,roleId){STAFF_ROLES[staffId]=roleId;}
function getRoleById(roleId){return ROLES.find(function(r){return r.id===roleId;})||ROLES[2];}

// בדיקת הרשאה לפי עובד
function checkPermission(staffId,actionId){
  var roleId=getStaffRole(staffId);
  var role=getRoleById(roleId);
  if(!role)return false;
  return role.permissions.indexOf(actionId)>=0;
}

// בדיקת הרשאה של המשתמש הנוכחי
function can(actionId){
  // מצא staffId של המשתמש הנוכחי לפי שם
  var s=STAFF.find(function(s){return s.name===ACTIVE_USER.name;});
  if(!s)return ACTIVE_USER.role==="בעלים"; // fallback לבעלים
  return checkPermission(s.id,actionId);
}

function PermissionsView(p){
  var[roles,setRoles]=useState(function(){return ROLES.slice();});
  var[selRole,setSelRole]=useState(ROLES[0]);
  var[editingRole,setEditingRole]=useState(null); // role being edited
  var[showAddRole,setShowAddRole]=useState(false);
  var[newRoleName,setNewRoleName]=useState("");
  var[newRoleDesc,setNewRoleDesc]=useState("");
  var[newRoleColor,setNewRoleColor]=useState("#3b82f6");
  var[staffRoles,setStaffRoles]=useState(function(){initStaffRoles();return Object.assign({},STAFF_ROLES);});

  function refresh(){setRoles(ROLES.slice());setSelRole(function(r){return ROLES.find(function(x){return x.id===r.id;})||ROLES[0];});setStaffRoles(Object.assign({},STAFF_ROLES));}

  function togglePerm(roleId,permId){
    var role=ROLES.find(function(r){return r.id===roleId;});
    if(!role||role.locked)return;
    var idx=role.permissions.indexOf(permId);
    if(idx>=0)role.permissions.splice(idx,1);
    else role.permissions.push(permId);
    refresh();
    p.toast("הרשאה עודכנה");
  }

  function addRole(){
    if(!newRoleName.trim())return;
    var nr={id:"role_"+Date.now(),name:newRoleName.trim(),desc:newRoleDesc.trim(),color:newRoleColor,locked:false,permissions:[]};
    ROLES.push(nr);
    setNewRoleName("");setNewRoleDesc("");setNewRoleColor("#3b82f6");setShowAddRole(false);
    refresh();p.toast("תפקיד חדש נוסף: "+nr.name);
  }

  function deleteRole(roleId){
    var idx=ROLES.findIndex(function(r){return r.id===roleId;});
    if(idx>=0&&!ROLES[idx].locked){
      ROLES.splice(idx,1);
      // reset staff with deleted role to 'staff'
      Object.keys(STAFF_ROLES).forEach(function(sid){if(STAFF_ROLES[sid]===roleId)STAFF_ROLES[sid]="staff";});
      refresh();p.toast("תפקיד הוסר");
    }
  }

  function assignRole(staffId,roleId){
    setStaffRole(staffId,roleId);
    setStaffRoles(Object.assign({},STAFF_ROLES));
    p.toast("תפקיד שויך בהצלחה");
  }

  // Group permissions by group
  var groups={};
  Object.values(PERMISSIONS).forEach(function(perm){
    if(!groups[perm.group])groups[perm.group]=[];
    groups[perm.group].push(perm);
  });

          </div>

              <input value={newRoleName} onChange={function(e){setNewRoleName(e.target.value);}} placeholder="שם התפקיד"
                style={{width:"100%",background:BG,border:"1px solid "+BDR,borderRadius:7,padding:"8px 10px",color:TXT,fontSize:13,fontFamily:"inherit",marginBottom:8,outline:"none"}}/>
              <input value={newRoleDesc} onChange={function(e){setNewRoleDesc(e.target.value);}} placeholder="תיאור (אופציונלי)"

                  style={{background:sel?ACCLO:CARD,border:"1px solid "+(sel?ACC:BDR),borderRadius:10,padding:"11px 14px",cursor:"pointer",position:"relative"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:role.color,flexShrink:0}}/>
                    <span style={{fontWeight:700,fontSize:13,color:sel?ACC:TXT}}>{role.name}</span>

                  </div>

                  <p style={{fontSize:11,color:MUT,marginTop:3,paddingRight:18}}>{role.permissions.length+" הרשאות"}</p>
                  {!role.locked&&sel&&(
                    <button onClick={function(e){e.stopPropagation();deleteRole(role.id);}}
                      style={{position:"absolute",top:10,left:10,background:REDLO,border:"1px solid "+RED+"33",borderRadius:5,padding:"2px 6px",fontSize:11,color:RED,cursor:"pointer"}}>{"מחק"}</button>
                  )}
                </div>

        {/* עמודה ימין - הרשאות + שיוך עובדים */}
        <div>
          {selRole&&(
            <div>
              {/* כרטיס הרשאות */}
              <div style={{background:CARD,border:"1px solid "+BDR,borderRadius:12,padding:18,marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                  <div style={{width:12,height:12,borderRadius:"50%",background:selRole.color}}/>
                  <h2 style={{fontSize:16,fontWeight:800,color:TXT}}>{selRole.name}</h2>
                  {selRole.locked&&<span style={{fontSize:11,color:AMB,background:AMBLO,padding:"2px 8px",borderRadius:999}}>{"הרשאות נעולות - תפקיד מובנה"}</span>}
                </div>

                {Object.entries(groups).map(function(entry){
                  var groupName=entry[0],perms=entry[1];
                  return(
                    <div key={groupName} style={{marginBottom:14}}>
                      <p style={{fontSize:12,fontWeight:700,color:MUT,marginBottom:8,borderBottom:"1px solid "+BDR,paddingBottom:5}}>{groupName}</p>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:6}}>
                        {perms.map(function(perm){
                          var has=selRole.permissions.indexOf(perm.id)>=0;
                          return(
                            <div key={perm.id} onClick={function(){togglePerm(selRole.id,perm.id);}}
                              style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,background:has?ACCLO:BG,border:"1px solid "+(has?ACC+"44":BDR),cursor:selRole.locked?"not-allowed":"pointer",opacity:selRole.locked?0.6:1}}>
                              <div style={{width:16,height:16,borderRadius:4,border:"2px solid "+(has?ACC:BDR),background:has?ACC:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:9,color:"#fff",fontWeight:800}}>
                                {has?"✓":""}
                              </div>
                              <span style={{fontSize:12,color:has?TXT:MUT}}>{perm.label}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* שיוך עובדים לתפקיד */}
              <div style={{background:CARD,border:"1px solid "+BDR,borderRadius:12,padding:18}}>
                <p style={{fontWeight:700,color:TXT,fontSize:14,marginBottom:14}}>{"עובדים בתפקיד: "+selRole.name}</p>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr style={{background:BG}}>{["עובד","תפקיד נוכחי","שנה תפקיד"].map(function(h){return <th key={h} style={{padding:"8px 12px",textAlign:"right",fontSize:12,color:MUT}}>{h}</th>;})}</tr></thead>
                  <tbody>
                    {STAFF.map(function(s){
                      var curRoleId=staffRoles[s.id]||"staff";
                      var curRole=getRoleById(curRoleId);
                      var isInSelRole=curRoleId===selRole.id;
                      return(
                        <tr key={s.id} style={{borderBottom:"1px solid "+BDR,background:isInSelRole?ACCLO+"44":"transparent"}}>
                          <td style={{padding:"10px 12px"}}>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{width:28,height:28,borderRadius:7,background:ACCLO,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:ACC}}>{s.name[0]}</div>
                              <div>
                                <p style={{fontSize:13,fontWeight:600,color:TXT}}>{s.name}</p>
                                <p style={{fontSize:11,color:MUT}}>{s.role}</p>
                              </div>
                            </div>
                          </td>
                          <td style={{padding:"10px 12px"}}>
                            <span style={{display:"inline-flex",alignItems:"center",gap:5,background:curRole?curRole.color+"22":"transparent",border:"1px solid "+(curRole?curRole.color+"44":BDR),borderRadius:999,padding:"3px 10px",fontSize:12,fontWeight:600,color:curRole?curRole.color:MUT}}>
                              <span style={{width:7,height:7,borderRadius:"50%",background:curRole?curRole.color:MUT,display:"inline-block"}}/>
                              {curRole?curRole.name:"עובד"}
                            </span>
                          </td>
                          <td style={{padding:"10px 12px"}}>
                            <select value={curRoleId} onChange={function(e){assignRole(s.id,e.target.value);}}
                              style={{background:BG,border:"1px solid "+BDR,borderRadius:7,padding:"6px 10px",color:TXT,fontSize:12,fontFamily:"inherit",cursor:"pointer"}}>
                              {ROLES.map(function(r){return <option key={r.id} value={r.id}>{r.name}</option>;})}
                            </select>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ---- ייבוא לקוחות ----
function ImportPanel(p){
  var[step,setStep]=useState("upload"); // upload | preview | done
  var[rows,setRows]=useState([]);
  var[errors,setErrors]=useState([]);
  var[imported,setImported]=useState(0);
  var[dragOver,setDragOver]=useState(false);
  var fileRef=React.useRef();

  var FIELDS=[
    {key:"name",      label:"שם לקוח / חברה",    req:true},
    {key:"taxId",     label:'מספר עוסק / ח"פ',   req:false},     {key:"caseNum",   label:"מספר תיק",           req:false},     {key:"email",     label:"דואר אלקטרוני",      req:false},     {key:"phone",     label:"טלפון",              req:false},     {key:"mobile",    label:"טלפון נייד",         req:false},     {key:"address",   label:"כתובת",              req:false},     {key:"city",      label:"עיר",                req:false},     {key:"type",      label:"סוג לקוח",           req:false},     {key:"clientType",label:"סיווג מס",           req:false},     {key:"monthlyFee",label:"שכ-ט חודשי",         req:false},     {key:"notes",     label:"הערות",              req:false},   ];    function parseCSV(text){     var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});     if(lines.length<2)return [];     var headers=lines[0].split(",").map(function(h){return h.replace(/"/g,"").trim().toLowerCase();});
    var headerMap={
      "שם":0,"name":0,"שם לקוח":0,"חברה":0,
      'מספר עוסק':1,"taxid":1,'ח"פ':1,"עוסק":1,"מספר עוסק מורשה":1,       "מספר תיק":2,"casenum":2,"תיק":2,       "אימייל":3,"email":3,"mail":3,"דואר אלקטרוני":3,       "טלפון":4,"phone":4,"tel":4,       "נייד":5,"mobile":5,"סלולרי":5,       "כתובת":6,"address":6,       "עיר":7,"city":7,       "סוג":8,"type":8,       "סיווג":9,"clienttype":9,       "שכ-ט":10,"fee":10,"שכר טרחה":10,"monthlyFee":10,       "הערות":11,"notes":11,     };     var colMap={};     headers.forEach(function(h,i){       var idx=headerMap[h];       if(idx!==undefined)colMap[FIELDS[idx].key]=i;     });     var parsed=[];     for(var i=1;i<lines.length;i++){       var cells=lines[i].split(",").map(function(c){return c.replace(/"/g,"").trim();});
      if(cells.every(function(c){return !c;}))continue;
      var row={};
      FIELDS.forEach(function(f){
        var ci=colMap[f.key];
        row[f.key]=ci!==undefined?cells[ci]||"":"";
      });
      if(!row.name)row.name=cells[0]||"";
      parsed.push(row);
    }
    return parsed;
  }

  function parseXLSX(arrayBuffer){
    // Use SheetJS (loaded from CDN)
    var XLSXlib=window.XLSX;
    if(!XLSXlib){p.toast("ספריית Excel לא נטענה, נסה שוב");return [];}
    var wb=XLSXlib.read(arrayBuffer,{type:"array"});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var json=XLSXlib.utils.sheet_to_json(ws,{defval:""});
    // Map Hebrew/English headers to our fields
    var headerMap={
      "שם":    "name","שם לקוח":"name","חברה":"name","name":"name",
      'מספר עוסק':"taxId",'ח"פ':"taxId","taxid":"taxId","עוסק":"taxId","מספר עוסק מורשה":"taxId",       "מספר תיק":"caseNum","casenum":"caseNum","תיק":"caseNum",       "אימייל":"email","email":"email","דואר אלקטרוני":"email","mail":"email",       "טלפון":"phone","phone":"phone","tel":"phone",       "נייד":"mobile","mobile":"mobile","סלולרי":"mobile",       "כתובת":"address","address":"address",       "עיר":"city","city":"city",       "סוג":"type","type":"type",       "סיווג":"clientType","clienttype":"clientType",       'שכ"ט':"monthlyFee","fee":"monthlyFee","שכר טרחה":"monthlyFee","monthlyFee":"monthlyFee","שכ-ט":"monthlyFee",
      "הערות":"notes","notes":"notes",
    };
    return json.map(function(row){
      var mapped={};
      Object.keys(row).forEach(function(k){
        var lk=k.trim().toLowerCase();
        var field=headerMap[k.trim()]||headerMap[lk];
        if(field)mapped[field]=String(row[k]);
      });
      if(!mapped.name){
        // try first column value as name
        var firstVal=String(Object.values(row)[0]||"").trim();
        if(firstVal)mapped.name=firstVal;
      }
      return mapped;
    }).filter(function(r){return r.name&&r.name.trim();});
  }

  function handleFile(file){
    if(!file)return;
    var ext=file.name.split(".").pop().toLowerCase();

    function finalize(parsed){
      if(parsed.length===0){p.toast("לא נמצאו נתונים קריאים בקובץ");return;}
      var errs=[];
      parsed.forEach(function(r,i){if(!r.name||!r.name.trim())errs.push("שורה "+(i+1)+": חסר שם לקוח");});
      setErrors(errs);setRows(parsed);setStep("preview");
    }

    if(ext==="xlsx"||ext==="xls"){
      // Load SheetJS dynamically if not loaded yet
      function doRead(){
        var reader=new FileReader();
        reader.onload=function(e){finalize(parseXLSX(e.target.result));};
        reader.readAsArrayBuffer(file);
      }
      if(window.XLSX){doRead();}
      else{
        var s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
        s.onload=doRead;
        s.onerror=function(){p.toast("שגיאה בטעינת ספריית Excel");};
        document.head.appendChild(s);
      }
      return;
    }

    var reader=new FileReader();
    reader.onload=function(e){
      var text=e.target.result;
      var parsed=[];
      if(ext==="csv"||ext==="txt"){
        parsed=parseCSV(text);
      } else if(ext==="json"){
        try{var arr=JSON.parse(text);if(Array.isArray(arr))parsed=arr;}catch(ex){}
      }
      finalize(parsed);
    };
    reader.readAsText(file,"utf-8");
  }

  function doImport(){
    var count=0;
    rows.forEach(function(r){
      if(!r.name||!r.name.trim())return;
      var exists=CLIENTS.find(function(c){return c.name===r.name.trim();});
      if(!exists){
        var nc={
          id:Date.now()+count,
          name:r.name.trim(),
          taxId:r.taxId||"",
          caseNum:r.caseNum||("IMP-"+String(Date.now()).slice(-4)),
          email:r.email||"",
          phone:r.phone||"",
          mobile:r.mobile||"",
          address:r.address||"",
          city:r.city||"",
          type:r.type||"פרטי",
          clientType:r.clientType||"",
          monthlyFee:r.monthlyFee?Number(r.monthlyFee.replace(/[^0-9.]/g,"")):0,
          billingDay:1,
          status:"פעיל",
          tags:[],
          last:new Date().toISOString().slice(0,10),
          notes:r.notes||"",
        };
        CLIENTS.unshift(nc);
        FOLDERS[nc.id]=["חוזים","פיננסים","התכתבויות"];
        BILLING[nc.id]=[];
        count++;
      }
    });
    setImported(count);
    setStep("done");
    p.toast("יובאו "+count+" לקוחות");
  }

  function downloadTemplate(){
    var headers=FIELDS.map(function(f){return f.label;}).join(",");
    var example=[
      '"כהן ושות","512345678","2024-010","cohen@firm.co.il","03-1234567","050-1234567","רחוב הרצל 1","תל אביב","חברה","חברה","5000",""',
      '"ישראל ישראלי","200123456","2024-011","israel@gmail.com","","054-9876543","שד. בן גוריון 5","חיפה","פרטי","עצמאי","3000",""',
    ];
    var csv=headers+"\n"+example.join("\n");
    var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.download="lexdoc_clients_template.csv";a.click();
    URL.revokeObjectURL(url);
  }

  if(step==="done") return(
    <div style={{textAlign:"center",padding:48}}>
      <div style={{fontSize:56,marginBottom:12}}>{"✅"}</div>
      <h2 style={{fontSize:20,fontWeight:800,color:GRN,marginBottom:8}}>{"הייבוא הושלם!"}</h2>
      <p style={{color:MUT,fontSize:14,marginBottom:20}}>{"יובאו "+imported+" לקוחות חדשים למערכת"}</p>
      <button onClick={function(){setStep("upload");setRows([]);setErrors([]);setImported(0);}}
        style={{background:ACC,border:"none",borderRadius:9,padding:"10px 24px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>
        {"ייבוא נוסף"}
      </button>
    </div>
  );

  if(step==="preview") return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <p style={{fontWeight:700,color:TXT,fontSize:15}}>{"תצוגה מקדימה — "+rows.length+" שורות"}</p>
          {errors.length>0&&<p style={{fontSize:12,color:RED,marginTop:3}}>{"⚠ "+errors.length+" שגיאות"}</p>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={function(){setStep("upload");setRows([]);}} style={{background:SUB,border:"1px solid "+BDR,borderRadius:8,padding:"8px 16px",color:MUT,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{"ביטול"}</button>
          <button onClick={doImport} style={{background:"linear-gradient(135deg,"+GRN+",#059669)",border:"none",borderRadius:8,padding:"8px 20px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            {"✓ ייבא "+rows.filter(function(r){return r.name;}).length+" לקוחות"}
          </button>
        </div>
      </div>
      {errors.length>0&&(
        <div style={{background:REDLO,border:"1px solid "+RED+"33",borderRadius:9,padding:"10px 14px",marginBottom:12}}>
          {errors.map(function(e,i){return <p key={i} style={{fontSize:12,color:RED,marginBottom:2}}>{e}</p>;})}
        </div>
      )}
      <div style={{background:CARD,border:"1px solid "+BDR,borderRadius:11,overflow:"auto",maxHeight:420}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:BG,position:"sticky",top:0}}>
            {["שם","עוסק","תיק","אימייל","טלפון","נייד","כתובת","עיר","סוג","שכ-ט"].map(function(h){
              return <th key={h} style={{padding:"8px 10px",textAlign:"right",color:MUT,fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>;
            })}
          </tr></thead>
          <tbody>
            {rows.map(function(r,i){
              var noName=!r.name||!r.name.trim();
              var dup=!noName&&CLIENTS.find(function(c){return c.name===r.name.trim();});
              return <tr key={i} style={{borderBottom:"1px solid "+BDR,background:noName?REDLO+"44":dup?AMBLO+"44":"transparent"}}>
                <td style={{padding:"8px 10px",fontWeight:600,color:noName?RED:dup?AMB:TXT}}>{r.name||"—"}{dup&&<span style={{fontSize:10,color:AMB,marginRight:4}}>{"(קיים)"}</span>}</td>
                <td style={{padding:"8px 10px",color:MUT}}>{r.taxId||"—"}</td>
                <td style={{padding:"8px 10px",color:MUT}}>{r.caseNum||"—"}</td>
                <td style={{padding:"8px 10px",color:MUT}}>{r.email||"—"}</td>
                <td style={{padding:"8px 10px",color:MUT}}>{r.phone||"—"}</td>
                <td style={{padding:"8px 10px",color:MUT}}>{r.mobile||"—"}</td>
                <td style={{padding:"8px 10px",color:MUT}}>{r.address||"—"}</td>
                <td style={{padding:"8px 10px",color:MUT}}>{r.city||"—"}</td>
                <td style={{padding:"8px 10px",color:MUT}}>{r.type||"—"}</td>
                <td style={{padding:"8px 10px",color:MUT}}>{r.monthlyFee||"—"}</td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>
  );

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
        {/* אזור גרור ושחרר */}
        <div
          onDragOver={function(e){e.preventDefault();setDragOver(true);}}
          onDragLeave={function(){setDragOver(false);}}
          onDrop={function(e){e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0]);}}
          onClick={function(){fileRef.current&&fileRef.current.click();}}
          style={{background:dragOver?ACCLO:CARD,border:"2px dashed "+(dragOver?ACC:BDR),borderRadius:14,padding:"40px 24px",textAlign:"center",cursor:"pointer",transition:"all 0.2s"}}>
          <input ref={fileRef} type="file" accept=".csv,.txt,.json,.xlsx,.xls" style={{display:"none"}} onChange={function(e){handleFile(e.target.files[0]);}}/>
          <div style={{fontSize:44,marginBottom:12}}>{"📥"}</div>
          <p style={{fontWeight:700,color:TXT,fontSize:15,marginBottom:6}}>{"גרור קובץ Excel / CSV לכאן"}</p>
          <p style={{fontSize:13,color:MUT,marginBottom:14}}>{"או לחץ לבחירת קובץ"}</p>
          <p style={{fontSize:11,color:MUT}}>{"נתמך: CSV, Excel (XLSX/XLS), JSON"}</p>
        </div>
        {/* הוראות + תבנית */}
        <div style={{background:CARD,border:"1px solid "+BDR,borderRadius:14,padding:20}}>
          <p style={{fontWeight:700,color:TXT,fontSize:14,marginBottom:12}}>{"📋 הוראות ייבוא"}</p>
          <div style={{fontSize:12,color:MUT,lineHeight:1.8}}>
            <p>{"• שורה ראשונה: כותרות עמודות (בעברית / אנגלית)"}</p>
            <p>{"• שדה חובה: שם לקוח / חברה"}</p>
            <p>{"• מספר עוסק: 9 ספרות (עוסק מורשה / ח\"פ)"}</p>
            <p>{"• שכ\"ט: מספר בשקלים (ללא סימן ₪)"}</p>
            <p>{"• לקוחות קיימים (אותו שם) לא יובאו פעמיים"}</p>
            <p>{"• Excel: כל שמות עמודות בשורה ראשונה (בעברית / אנגלית)"}
              <p style={{color:GRN,fontWeight:700}}>{"✓ תומך ב-XLSX, XLS, CSV, JSON"}</p></p>
          </div>
          <button onClick={downloadTemplate}
