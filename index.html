var _LIC_KEY  = "lexdoc_license_v2";
var _TRIAL_KEY = "lexdoc_trial_v2";
var _LIC_SALT = 133337;
var _LIC_MULT = 7;
var _LIC_MOD  = 1000000;
var _SUPPORT_PHONE = "04-6444925";

function generateChallenge(){
  return Math.floor(100000 + Math.random() * 900000);
}
function verifyResponse(challenge, response){
  var expected = (challenge * _LIC_MULT + _LIC_SALT) % _LIC_MOD;
  return String(expected).padStart(6,"0") === String(response).trim().padStart(6,"0");
}
function devCalcResponse(challenge){
  return String((challenge * _LIC_MULT + _LIC_SALT) % _LIC_MOD).padStart(6,"0");
}

// שמירת תחילת תקופת ניסיון (נקרא בסיום הרשמה)
function startTrial(){
  try{
    if(!localStorage.getItem(_TRIAL_KEY)){
      var expiry=new Date();
      expiry.setDate(expiry.getDate()+30);
      localStorage.setItem(_TRIAL_KEY,JSON.stringify({
        startedAt:new Date().toISOString(),
        expiry:expiry.toISOString(),
      }));
    }
  }catch(e){}
}

// בדיקת מצב הרישיון
function getLicenseStatus(){
  try{
    // בדוק הפעלה מלאה (שנתית)
    var lic=localStorage.getItem(_LIC_KEY);
    if(lic){
      var d=JSON.parse(lic);
      if(d&&d.activated&&new Date(d.expiry)>new Date()){
        var daysLeft=Math.ceil((new Date(d.expiry)-new Date())/86400000);
        return {status:"active", daysLeft:daysLeft};
      }
    }
    // בדוק תקופת ניסיון
    var trial=localStorage.getItem(_TRIAL_KEY);
    if(trial){
      var t=JSON.parse(trial);
      if(new Date(t.expiry)>new Date()){
        var trialLeft=Math.ceil((new Date(t.expiry)-new Date())/86400000);
        return {status:"trial", daysLeft:trialLeft};
      }
      return {status:"expired"};
    }
    // משרד חדש שעוד לא הפעיל ניסיון
    return {status:"new"};
  }catch(e){return {status:"new"};}
}

function saveFullLicense(challenge){
  var expiry=new Date();
  expiry.setFullYear(expiry.getFullYear()+1);
  localStorage.setItem(_LIC_KEY,JSON.stringify({
    activated:true,
    challenge:challenge,
    activatedAt:new Date().toISOString(),
    expiry:expiry.toISOString(),
  }));
}

function ActivationScreen(p){
  var[challenge]=useState(function(){return generateChallenge();});
  var[response,setResponse]=useState("");
  var[err,setErr]=useState("");
  var[success,setSuccess]=useState(false);

    if(verifyResponse(challenge,response)){
      saveFullLicense(challenge);
      setSuccess(true);
      setTimeout(function(){p.onActivated();},1500);

        placeholder={"_ _ _ _ _ _"}/>

var SKEY="lexdoc_v5";
function sLoad(cb){try{var r=localStorage.getItem(SKEY);cb(r?JSON.parse(r):null);}catch(e){cb(null);}}
var STORAGE_MAX_BYTES = 4.5 * 1024 * 1024; // 4.5MB מגבלה בטוחה (מתוך 5MB)
var STORAGE_WARN_BYTES = 3.5 * 1024 * 1024; // 3.5MB — אזהרה

function getStorageUsed(){
  try{
    var total=0;
    for(var k in localStorage){
      if(localStorage.hasOwnProperty(k)){
        total+=(localStorage[k].length+k.length)*2; // UTF-16
      }
    }
    return total;
  }catch(e){return 0;}
}

function trimForStorage(d){
  // גרסה מוקטנת: ללא base64 של לוגו אם הנתונים גדולים מדי
  var copy=JSON.parse(JSON.stringify(d));
  var raw=JSON.stringify(copy);
  if(raw.length*2 > STORAGE_MAX_BYTES){
    // הסר לוגו base64 (יכול להיות מאות KB)
    if(copy.logo&&copy.logo.length>1000){
      copy.logo="[לוגו הוסר לחיסכון במקום]";
    }
  }
  return copy;
}

function sSave(d,cb){
  try{
    var trimmed=trimForStorage(d);
    var serialized=JSON.stringify(trimmed);
    var byteSize=serialized.length*2;
    if(byteSize > STORAGE_MAX_BYTES){
      console.warn("LexDoc: נתונים גדולים מדי לשמירה ("+Math.round(byteSize/1024)+"KB > "+Math.round(STORAGE_MAX_BYTES/1024)+"KB)");
      if(cb)cb("overflow");
      return;
    }
    localStorage.setItem(SKEY,serialized);
    if(byteSize > STORAGE_WARN_BYTES){
      console.warn("LexDoc: אחסון ב-"+Math.round(byteSize/1024/1024*10)/10+"MB — קרוב למגבלה!");
    }
    if(cb)cb();
  }catch(e){
    // QuotaExceededError
    if(cb)cb("quota");
  }
}

function getStorageStats(){
  try{
    var raw=localStorage.getItem(SKEY)||"";
    var usedBytes=raw.length*2;
    var pct=Math.round(usedBytes/STORAGE_MAX_BYTES*100);
    return {
      usedBytes:usedBytes,
      usedKB:Math.round(usedBytes/1024*10)/10,
      usedMB:Math.round(usedBytes/1024/1024*100)/100,
      pct:pct,
      maxMB:4.5,
      status: pct>90?"critical":pct>70?"warning":"ok",
    };
  }catch(e){return {usedBytes:0,usedKB:0,usedMB:0,pct:0,maxMB:4.5,status:"ok"};}
}
function sClear(cb){try{localStorage.removeItem(SKEY);if(cb)cb();}catch(e){if(cb)cb();}}

// Per-client docs store (generated letters saved here)
var CLIENT_DOCS={};
function getClientDocs(cid,folder){
  if(!CLIENT_DOCS[cid])CLIENT_DOCS[cid]={};
  if(!CLIENT_DOCS[cid][folder])CLIENT_DOCS[cid][folder]=[];
  return CLIENT_DOCS[cid][folder];
}
function saveClientDoc(cid,folder,doc){
  if(!CLIENT_DOCS[cid])CLIENT_DOCS[cid]={};
  if(!CLIENT_DOCS[cid][folder])CLIENT_DOCS[cid][folder]=[];
  CLIENT_DOCS[cid][folder].unshift(doc);
  // Also ensure folder exists in FOLDERS
  if(!FOLDERS[cid])FOLDERS[cid]=["התכתבויות","חוזים"];
  if(FOLDERS[cid].indexOf(folder)<0)FOLDERS[cid].push(folder);
}
function getClientAllDocs(cid,folder){
  var base=(DOCS[folder]||[]);
  var client=getClientDocs(cid,folder);
  return client.concat(base);
}

function getAutoTaskCategory(filingType){
  if(filingType==="niiDeduct") return "nii";
  return "taxAuth";
}

// חישוב תאריך 10 ימים לפני מועד ההגשה
function taskDueDateForFiling(dueDate){
  var d=new Date(dueDate);
  d.setDate(d.getDate()-10);
  return d.toISOString().slice(0,10);
}

// יצירת משימה אוטומטית עבור הגשה אחת
function createAutoTaskForFiling(filing, client){
  // אם כבר קיימת משימה לאותה הגשה — לא ניצור שוב
  if(AUTO_TASKS_LOG[filing.id]){
    var existing=TASKS.find(function(t){return t.id===AUTO_TASKS_LOG[filing.id];});
    if(existing&&existing.status!=="cancelled")return null;
  }
  // מצא עובד אחראי ללקוח
  var staffId=getClientStaff(client.id);
  var staffName="";
  if(staffId){
    var s=STAFF.find(function(x){return x.id===staffId;});
    if(s)staffName=s.name;
  }
  if(!staffName&&STAFF.length>0)staffName=STAFF[0].name;

  var taskDue=taskDueDateForFiling(filing.due);
  var today=new Date().toISOString().slice(0,10);

  // אם מועד המשימה כבר עבר ולפני ה-due — עדיין ניצור (משימה דחופה)
  var task={
    clientId:client.id,
    title:getAutoTaskLabel(filing.type)+" — "+client.name,
    desc:"הגשה: "+getFilingLabel(filing.type)+" | תקופה: "+filing.period+" | מועד הגשה: "+filing.due,
    dueDate:taskDue,
    priority:taskDue<today?"high":"medium",
    status:"open",
    assignedTo:staffName,
    category:getAutoTaskCategory(filing.type),
    isAuto:true,          // סימון משימה אוטומטית
    filingId:filing.id,
    filingDue:filing.due,
    filingType:filing.type,
    period:filing.period,
  };
  addTask(task);
  var newId=TASKS[TASKS.length-1].id;
  AUTO_TASKS_LOG[filing.id]=newId;
  return newId;
}

// סריקת כל ההגשות וייצור משימות אוטומטיות ל-10 ימים לפני
function runAutoTaskEngine(notify){
  var today=new Date().toISOString().slice(0,10);
  // תאריך חלון: היום + 30 יום קדימה (יוצר משימות עתידיות גם)
  var windowEnd=new Date();windowEnd.setDate(windowEnd.getDate()+30);
  var windowStr=windowEnd.toISOString().slice(0,10);
  var created=0;

  CLIENTS.forEach(function(client){
    var filings=FILINGS[client.id]||[];
    filings.forEach(function(filing){
      if(filing.status==="filed")return; // כבר הוגש — דלג
      var taskDue=taskDueDateForFiling(filing.due);
      // צור משימה אם: תאריך המשימה כבר הגיע (או עבר) ולפני מועד ההגשה
      if(taskDue<=windowStr&&filing.due>=today){
        var result=createAutoTaskForFiling(filing,client);
        if(result)created++;
      }
    });
  });

  if(notify&&created>0){
    return created;
  }
  return created;
}

// הסרת משימות אוטומטיות של הגשה שסומנה כ"הוגש"
function cancelAutoTaskForFiling(filingId){
  var taskId=AUTO_TASKS_LOG[filingId];
  if(taskId){
    var t=TASKS.find(function(x){return x.id===taskId;});
    if(t&&t.status==="open"){
      updateTask(taskId,{status:"cancelled"});
    }
  }
}

// ---- Filings Tracker Data ----
// FILING_SETTINGS[clientId] = { vatFreq:'monthly'|'bimonthly', taxAdv:bool, taxDeduct:bool, niiDeduct:bool }
var FILING_SETTINGS={};
function getFilingSettings(cid){
  if(!FILING_SETTINGS[cid])FILING_SETTINGS[cid]={vatFreq:"monthly",taxAdvEnabled:false,taxAdvFreq:"monthly",taxDeductEnabled:false,taxDeductFreq:"monthly",niiDeductEnabled:false,niiDeductFreq:"monthly"};
  return FILING_SETTINGS[cid];
}
// FILINGS[clientId] = [{id,type,period,due,status:'pending'|'filed'|'late',filedDate,note}]
// type: 'vat'|'taxAdv'|'taxDeduct'|'niiDeduct'
var FILINGS={};
function getFilings(cid){if(!FILINGS[cid])FILINGS[cid]=[];return FILINGS[cid];}
function generateFilingSchedule(cid,year){
  var settings=getFilingSettings(cid);
  var arr=[];
  var months=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
  var yr=year||new Date().getFullYear();

  function dueDate(reportMonth){
    var dueMonth=reportMonth+1;
    var dueYear=yr;
    if(dueMonth>11){dueMonth=0;dueYear=yr+1;}
    return dueYear+"-"+String(dueMonth+1).padStart(2,"0")+"-15";
  }
  function addMonthly(type,prefix){
    for(var m=0;m<12;m++){
      arr.push({id:prefix+"-"+yr+"-"+m,type:type,period:months[m]+" "+yr,due:dueDate(m),status:"ממתין",filedDate:"",note:""});
    }
  }
  function addBimonthly(type,prefix){
    for(var bm=0;bm<12;bm+=2){
      arr.push({id:prefix+"-"+yr+"-"+bm,type:type,period:months[bm]+"-"+months[bm+1]+" "+yr,due:dueDate(bm+1),status:"ממתין",filedDate:"",note:""});
    }
  }

  if(settings.vatFreq==="monthly"){addMonthly("vat","vat");}else{addBimonthly("vat","vat");}

  if(settings.taxAdvEnabled){
    if(settings.taxAdvFreq==="monthly"){addMonthly("taxAdv","taxadv");}else{addBimonthly("taxAdv","taxadv");}
  }
  if(settings.taxDeductEnabled){
    if(settings.taxDeductFreq==="monthly"){addMonthly("taxDeduct","taxded");}else{addBimonthly("taxDeduct","taxded");}
  }
  if(settings.niiDeductEnabled){
    if(settings.niiDeductFreq==="monthly"){addMonthly("niiDeduct","nii");}else{addBimonthly("niiDeduct","nii");}
  }
  return arr;
}
function getFilingLabel(type){
  if(type==="vat")return "מעמ";
  if(type==="taxAdv")return "מקדמות מ.ה.";
  if(type==="taxDeduct")return "ניכויים מ.ה.";
  if(type==="niiDeduct")return "ניכויים ב.ל.";
  return type;
}
function getFilingColor(type){
  if(type==="vat")return "blue";
  if(type==="taxAdv")return "amber";
  if(type==="taxDeduct")return "green";
  if(type==="niiDeduct")return "red";
  return "gray";
}

function buildBackup(firm){
  return {
    version:2,
    ts:new Date().toISOString(),
    firm:firm,
    clients:CLIENTS.slice(),
    folders:JSON.parse(JSON.stringify(FOLDERS)),
    staff:STAFF.slice(),
    clientStaff:JSON.parse(JSON.stringify(CLIENT_STAFF)),
    billing:JSON.parse(JSON.stringify(BILLING)),
    hours:JSON.parse(JSON.stringify(HOURS)),
    invoices:JSON.parse(JSON.stringify(INVOICES)),
    filingSettings:JSON.parse(JSON.stringify(FILING_SETTINGS)),
    filings:JSON.parse(JSON.stringify(FILINGS)),
    clientUsers:JSON.parse(JSON.stringify(CLIENT_USERS)),
    activity:JSON.parse(JSON.stringify(ACTIVITY)),
    staffRoles:JSON.parse(JSON.stringify(STAFF_ROLES)),
    autoTasksLog:JSON.parse(JSON.stringify(AUTO_TASKS_LOG)),
    msgLog:MSG_LOG.slice(),
    tasks:TASKS.slice(),
    contacts:CONTACTS.slice(),
    interactions:INTERACTIONS.slice(),
  };
}
function restoreBackup(bak){
  if(!bak||bak.version<1)return false;
  try{
    if(bak.clients)bak.clients.forEach(function(c){var found=false;for(var i=0;i<CLIENTS.length;i++){if(CLIENTS[i].id===c.id){CLIENTS[i]=c;found=true;break;}}if(!found)CLIENTS.push(c);});
    if(bak.staff)bak.staff.forEach(function(s){var found=false;for(var i=0;i<STAFF.length;i++){if(STAFF[i].id===s.id){STAFF[i]=s;found=true;break;}}if(!found)STAFF.push(s);});
    if(bak.clientStaff)Object.keys(bak.clientStaff).forEach(function(k){CLIENT_STAFF[k]=bak.clientStaff[k];});
    if(bak.billing)Object.keys(bak.billing).forEach(function(k){BILLING[k]=bak.billing[k];});
    if(bak.hours)Object.keys(bak.hours).forEach(function(k){HOURS[k]=bak.hours[k];});
    if(bak.invoices)Object.keys(bak.invoices).forEach(function(k){INVOICES[k]=bak.invoices[k];});
    if(bak.filingSettings)Object.keys(bak.filingSettings).forEach(function(k){FILING_SETTINGS[k]=bak.filingSettings[k];});
    if(bak.filings)Object.keys(bak.filings).forEach(function(k){FILINGS[k]=bak.filings[k];});
    if(bak.clientUsers)Object.keys(bak.clientUsers).forEach(function(k){CLIENT_USERS[k]=bak.clientUsers[k];});
    if(bak.activity)Object.keys(bak.activity).forEach(function(k){ACTIVITY[k]=bak.activity[k];});
    if(bak.staffRoles)Object.keys(bak.staffRoles).forEach(function(k){STAFF_ROLES[k]=bak.staffRoles[k];});
    if(bak.autoTasksLog)Object.keys(bak.autoTasksLog).forEach(function(k){AUTO_TASKS_LOG[k]=bak.autoTasksLog[k];});
    if(bak.tasks)bak.tasks.forEach(function(t){if(!TASKS.find(function(x){return x.id===t.id;}))TASKS.push(t);});
    if(bak.contacts)bak.contacts.forEach(function(c){if(!CONTACTS.find(function(x){return x.id===c.id;}))CONTACTS.push(c);});
    if(bak.interactions)bak.interactions.forEach(function(i){if(!INTERACTIONS.find(function(x){return x.id===i.id;}))INTERACTIONS.push(i);});
    if(bak.folders)Object.keys(bak.folders).forEach(function(k){FOLDERS[k]=bak.folders[k];});
    return bak.firm||true;
  }catch(e){return false;}
}

                    </div>

                  </div>

              <div style={{display:"flex",gap:8,marginTop:4}}>

                <Btn style={{flex:2,background:saving?"#333":undefined}} disabled={saving} onClick={finish}>{saving?"שומר...":"סיים הגדרה"}</Btn>
              </div>

          )}

          {step===4&&(
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:48,marginBottom:12}}>v</div>
              <h2 style={{fontSize:18,fontWeight:800,color:GRN,marginBottom:8}}>Firm setup complete!</h2>
              <p style={{color:MUT,fontSize:14,marginBottom:18}}>Username: <strong style={{color:TXT}}>{uname}</strong></p>
              <div style={{background:GRNLO,border:"1px solid "+GRN+"33",borderRadius:10,padding:14,marginBottom:18,textAlign:"right"}}>

                <div style={{fontSize:14,color:TXT}}>[v] Audit log ready</div>
              </div>
              <Btn full onClick={function(){setStep(5);}}>{"עבור להתחברות"}</Btn>
            </div>

        </div>
      </div>
    </div>
  );
}

function Login(p){
  var firm=p.firm;
  var[uname,setUname]=useState("");
  var[pw,setPw]=useState("");
  var[st,setSt]=useState("idle");
  var[tries,setTries]=useState(0);
  var[code,setCode]=useState("");
  var days=daysLeft(firm.expiry);

  function submit(){setSt("loading");setTimeout(function(){if(pw.length>=6){setSt("mfa");}else{setTries(function(t){return t+1;});setSt("error");setTimeout(function(){setSt("idle");},2000);}},700);}
  function submitMfa(){setSt("loading");setTimeout(function(){ACTIVE_USER={name:firm.username,role:"בעלים"};p.onLogin();},600);}

  var typeStr=firm.btype==="עורך דין"?"משרד עורכי דין":firm.btype==="cpa"?"משרד רואי חשבון":firm.btype==="combined"?"עו-ד + רו-ח":"נוטריון";

  return(
    <div dir="rtl" style={{minHeight:"100vh",background:BG,display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'Segoe UI',sans-serif"}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{background:SURF,border:"1px solid "+BDR,borderRadius:20,padding:26,boxShadow:"0 24px 80px rgba(0,0,0,0.6)"}}>
          <div style={{display:"flex",gap:12,alignItems:"center",paddingBottom:16,marginBottom:16,borderBottom:"1px solid "+BDR}}>
            <div style={{width:48,height:48,borderRadius:12,overflow:"hidden",flexShrink:0,background:"linear-gradient(135deg,"+ACCLO+","+ACC+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>
              {firm.logo?<img src={firm.logo} alt="logo" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:"L"}

            <div>
              <h1 style={{fontSize:17,fontWeight:800,color:TXT}}>{firm.firmName}</h1>
              <p style={{fontSize:12,color:MUT,marginTop:2}}>{typeStr+" | "+firm.regNum}</p>
              {firm.city&&<p style={{fontSize:12,color:MUT}}>{firm.city}</p>}
            </div>
          </div>
          <div style={{background:days>30?GRNLO:AMBLO,border:"1px solid "+(days>30?GRN+"33":AMB+"33"),borderRadius:8,padding:"9px 12px",marginBottom:16}}>
            <p style={{fontSize:13,fontWeight:700,color:days>30?GRN:AMB}}>{firm.planLabel+" מנוי"}</p>
            <p style={{fontSize:12,color:MUT}}>{days+" ימים נותרים | עד "+fmtDate(firm.expiry)}</p>
          </div>
          {st!=="mfa"?(
            <div>
              <div style={{background:ACCLO,border:"1px solid "+ACC+"44",borderRadius:7,padding:"7px 12px",marginBottom:12,fontSize:13,color:ACC}}>{"שם משתמש: "+firm.username}</div>
              <Fld label="שם משתמש" value={uname} onChange={setUname} ph={firm.username}/>
              <Fld label="סיסמה" value={pw} onChange={setPw} ph="הסיסמה שלך" type="password" hint="מינימום 6 תווים"/>
              {st==="error"&&<div style={{background:REDLO,border:"1px solid "+RED+"44",borderRadius:7,padding:"8px 12px",marginBottom:10,fontSize:13,color:RED}}>{"סיסמה שגויה (ניסיון "+tries+"/5)"}</div>}
              <div style={{background:SUB,borderRadius:7,padding:"7px 12px",marginBottom:12,fontSize:12,color:MUT}}>Bot protection active</div>
              <Btn full onClick={submit}>{st==="loading"?"מאמת...":"כניסה"}</Btn>
              <div style={{textAlign:"center",marginTop:10}}>
                <button onClick={p.onReset} style={{background:"none",border:"none",color:MUT,fontSize:12,cursor:"pointer",textDecoration:"underline"}}>{"לא המשרד שלך? אפס"}</button>
              </div>
              <div style={{display:"flex",justifyContent:"center",marginTop:14,gap:8,alignItems:"center"}}>
                <span style={{fontSize:12,color:MUT}}>{"עיצוב:"}</span>

            </div>
          ):(
            <div>
              <div style={{background:GRNLO,border:"1px solid "+GRN+"33",borderRadius:8,padding:12,marginBottom:16,textAlign:"center"}}>
                <p style={{color:GRN,fontWeight:700,fontSize:14}}>Step 1 OK</p>

function HoursModal(p){
  var c=p.client;
  var[records,setRecords]=useState(function(){return getHours(c.id).slice();});
  var[selStaff,setSelStaff]=useState(STAFF[0]?String(STAFF[0].id):"");
  var[hours,setHours]=useState("");
  var[note,setNote]=useState("");
  var[date,setDate]=useState(new Date().toISOString().slice(0,10));
  var[err,setErr]=useState("");
  var staff=getStaff();
  var totalHrs=records.reduce(function(s,r){return s+r.hours;},0);
  var today=new Date().toISOString().slice(0,10);
  var todayHrs=records.filter(function(r){return r.date===today;}).reduce(function(s,r){return s+r.hours;},0);
  function add(){
    if(!hours||isNaN(Number(hours))||Number(hours)<=0){setErr("הזן שעות תקינות");return;}
    if(!selStaff){setErr("בחר עובד");return;}
    var sf=null;for(var i=0;i<staff.length;i++){if(String(staff[i].id)===selStaff){sf=staff[i];break;}}
    if(!sf){setErr("עובד לא נמצא");return;}
    logHours(c.id,sf.id,sf.name,Number(hours),note.trim(),date);
    logAct(c.id,sf.name,"רשם שעות",Number(hours)+"h on "+date);
    setRecords(getHours(c.id).slice());
    setHours("");setNote("");setErr("");
    p.toast(sf.name+" logged "+hours+"h v");
  }
  var byStaff={};
  records.forEach(function(r){if(!byStaff[r.staffName])byStaff[r.staffName]=0;byStaff[r.staffName]+=r.hours;});
  return(
    <div onClick={p.onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:700,padding:20}}>
      <div dir="rtl" onClick={function(e){e.stopPropagation();}} style={{background:SURF,border:"1px solid "+BDR,borderRadius:18,width:"100%",maxWidth:680,maxHeight:"90vh",overflow:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.7)"}}>
        <div style={{padding:"20px 24px 16px",borderBottom:"1px solid "+BDR,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:SURF,zIndex:1}}>
          <div><h2 style={{fontSize:17,fontWeight:800,color:TXT}}>{"יומן שעות - "+c.name}</h2><p style={{fontSize:12,color:MUT,marginTop:2}}>{c.caseNum+" | סהכ: "+totalHrs+"ש | היום: "+todayHrs+"h"}</p></div>
          <button onClick={p.onClose} style={{background:"none",border:"none",cursor:"pointer",color:MUT,fontSize:20}}>x</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,padding:"14px 24px",borderBottom:"1px solid "+BDR}}>
          <div style={{background:CARD,borderRadius:9,padding:"11px 14px"}}><p style={{fontSize:12,color:MUT,marginBottom:3}}>Total Hours</p><p style={{fontSize:20,fontWeight:800,color:ACC}}>{totalHrs+"h"}</p></div>
          <div style={{background:CARD,borderRadius:9,padding:"11px 14px"}}><p style={{fontSize:12,color:MUT,marginBottom:3}}>Today</p><p style={{fontSize:20,fontWeight:800,color:GRN}}>{todayHrs+"h"}</p></div>
          <div style={{background:CARD,borderRadius:9,padding:"11px 14px"}}><p style={{fontSize:12,color:MUT,marginBottom:3}}>Staff Active</p><p style={{fontSize:20,fontWeight:800,color:AMB}}>{Object.keys(byStaff).length}</p></div>
        </div>
        <div style={{padding:"14px 24px",borderBottom:"1px solid "+BDR}}>
          <p style={{fontSize:13,fontWeight:700,color:ACC,marginBottom:10,letterSpacing:1}}>{"רישום שעות"}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 12px"}}>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:13,color:MUT,display:"block",marginBottom:5}}>Staff Member</label>
              <select value={selStaff} onChange={function(e){setSelStaff(e.target.value);}} style={{width:"100%",background:BG,border:"1px solid "+BDR,borderRadius:9,padding:"10px 12px",color:TXT,fontSize:14,fontFamily:"inherit"}}>
                {staff.map(function(s){return <option key={s.id} value={String(s.id)}>{s.name+" ("+s.role+")"}</option>;})}
              </select>
            </div>
            <Fld label="שעות" value={hours} onChange={setHours} ph="2.5" type="number" err={err}/>
            <Fld label="תאריך" value={date} onChange={setDate} type="date"/>
          </div>
          <div style={{marginBottom:12,marginTop:-6}}>

              <tbody>
                {records.map(function(r){
                  var sf=null;for(var i=0;i<staff.length;i++){if(staff[i].id===r.staffId){sf=staff[i];break;}}

                      <td style={{padding:"10px 14px",fontSize:13,color:MUT}}>{r.date}</td>
                      <td style={{padding:"10px 14px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <div style={{width:24,height:24,borderRadius:"50%",background:ACCLO,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:ACC}}>{r.staffName[0]}</div>
                          <span style={{fontSize:13,fontWeight:600,color:TXT}}>{r.staffName}</span>

                      </td>
                      <td style={{padding:"10px 14px"}}><Bdg color="blue" sm>{sf?sf.role:"עובד"}</Bdg></td>

        </div>
      </div>
    </div>
  );
}

// ---- Invoice Modal ----
function InvoiceModal(p){
  var c=p.client;
  var firm=p.firm;
  var[invoices,setInvoices]=useState(function(){return getInvoices(c.id).slice();});
  var[showCreate,setShowCreate]=useState(false);
  var[selMonth,setSelMonth]=useState(new Date().toISOString().slice(0,7));
  function create(){
    if(!c.monthlyFee||c.monthlyFee<=0){p.toast("אין שכר טרחה חודשי");return;}
    var monthHrs=getHours(c.id).filter(function(r){return r.date.slice(0,7)===selMonth;});
    var inv=createInvoice(c.id,c.name,c.monthlyFee,monthHrs,firm);
    logAct(c.id,ACTIVE_USER.name,"חשבונית נוצרה",inv.invoiceNum);
    setInvoices(getInvoices(c.id).slice());
    setShowCreate(false);
    p.toast("חשבונית "+inv.invoiceNum+" created v");
  }
  function printInv(inv){
    var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var d=new Date(inv.date);
    var monthHrs=getHours(c.id).filter(function(r){return r.date.slice(0,7)===inv.date.slice(0,7);});
    var totalHrs=monthHrs.reduce(function(s,r){return s+r.hours;},0);
    var byStaff={};
    monthHrs.forEach(function(r){if(!byStaff[r.staffName])byStaff[r.staffName]=0;byStaff[r.staffName]+=r.hours;});
    var sep="=".repeat(50);var sep2="-".repeat(50);
    var lines=[sep,"       חשבון עסקה",sep,"","מספר חשבונית: "+inv.invoiceNum+"    תאריך: "+inv.date,"","מאת:","  "+inv.firmName,"  ח.פ.: "+inv.firmReg];
    if(inv.firmPhone)lines.push("  טלפון: "+inv.firmPhone);
    if(inv.firmEmail)lines.push("  אימייל: "+inv.firmEmail);
    lines.push("","אל:","  "+inv.clientName,"  תיק: "+c.caseNum);
    if(c.email)lines.push("  אימייל: "+c.email);
    lines.push("",sep2,"שירותים - "+months[d.getMonth()]+" "+d.getFullYear(),sep2,"","  שכר טרחה חודשי:    "+fmtMoney(inv.subtotal));
    if(totalHrs>0){lines.push("","  שעות החודש: "+totalHrs+"h");Object.keys(byStaff).forEach(function(nm){lines.push("    "+nm+": "+byStaff[nm]+"h");});}
    lines.push("",sep2,"  לפני מעמ:           "+fmtMoney(inv.subtotal),"  מעמ (18%):          "+fmtMoney(inv.vatAmount),"  סהכ לתשלום:         "+fmtMoney(inv.total),sep,"","מועד תשלום: יום "+c.billingDay+" לכל חודש","תודה על שיתוף הפעולה.");
    var text=lines.join("\n");
    var blob=new Blob([text],{type:"text/plain;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var link=window.document.createElement("a");
    link.href=url;link.download=inv.invoiceNum+"-"+c.name+".txt";link.click();
    URL.revokeObjectURL(url);
    var arr=getInvoices(c.id);
    for(var i=0;i<arr.length;i++){if(arr[i].id===inv.id){arr[i].sent=true;break;}}
    setInvoices(getInvoices(c.id).slice());
    logAct(c.id,ACTIVE_USER.name,"חשבונית הודפסה",inv.invoiceNum);
    p.toast(inv.invoiceNum+" downloaded v");
  }
  function markPaid(id){
    var arr=getInvoices(c.id);
    for(var i=0;i<arr.length;i++){if(arr[i].id===id){arr[i].paid=true;break;}}
    setInvoices(arr.slice());
    p.toast("סומן כשולם");
  }
  var MONTH_OPTS=[];
  for(var mi=0;mi<12;mi++){var md=new Date();md.setMonth(md.getMonth()-mi);MONTH_OPTS.push(md.toISOString().slice(0,7));}
  var monthHrsCount=getHours(c.id).filter(function(r){return r.date.slice(0,7)===selMonth;}).reduce(function(s,r){return s+r.hours;},0);
  return(
    <div onClick={p.onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:700,padding:20}}>
      <div dir="rtl" onClick={function(e){e.stopPropagation();}} style={{background:SURF,border:"1px solid "+BDR,borderRadius:18,width:"100%",maxWidth:700,maxHeight:"90vh",overflow:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.7)"}}>
        <div style={{padding:"20px 24px 16px",borderBottom:"1px solid "+BDR,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:SURF,zIndex:1}}>
          <div><h2 style={{fontSize:17,fontWeight:800,color:TXT}}>{"חשבוניות - "+c.name}</h2><p style={{fontSize:12,color:MUT,marginTop:2}}>{c.caseNum+(c.monthlyFee?" | חודשי: "+fmtMoney(c.monthlyFee)+" + מעמ":"")}</p></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={function(){setShowCreate(function(x){return !x;});}} style={{background:"linear-gradient(135deg,"+GRNLO+","+GRN+")",border:"none",borderRadius:8,padding:"7px 14px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>+ New Invoice</button>
            <button onClick={p.onClose} style={{background:"none",border:"none",cursor:"pointer",color:MUT,fontSize:20}}>x</button>
          </div>
        </div>
        {showCreate&&(
          <div style={{padding:"16px 24px",background:CARD,borderBottom:"1px solid "+BDR}}>
            <p style={{fontSize:13,fontWeight:700,color:GRN,marginBottom:12}}>Create Transaction Invoice</p>
            {c.monthlyFee>0?(
              <div>
                <div style={{background:GRNLO,border:"1px solid "+GRN+"33",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:13}}>
                  <p style={{color:GRN,fontWeight:700}}>Invoice will include:</p>
                  <p style={{color:TXT,marginTop:4}}>{"שכט חודשי: "+fmtMoney(c.monthlyFee)}</p>
                  <p style={{color:TXT}}>{"מעמ 18%: "+fmtMoney(Math.round(c.monthlyFee*0.18))}</p>
                  <p style={{color:TXT,fontWeight:700}}>{"סהכ: "+fmtMoney(Math.round(c.monthlyFee*1.18))}</p>
                </div>
                <div style={{marginBottom:12}}>
                  <label style={{fontSize:13,color:MUT,display:"block",marginBottom:5}}>Billing Period</label>
                  <select value={selMonth} onChange={function(e){setSelMonth(e.target.value);}} style={{background:BG,border:"1px solid "+BDR,borderRadius:9,padding:"10px 12px",color:TXT,fontSize:14,fontFamily:"inherit"}}>
                    {MONTH_OPTS.map(function(m){return <option key={m} value={m}>{m}</option>;})}
                  </select>
                </div>
                {monthHrsCount>0&&(
                  <div style={{background:ACCLO,border:"1px solid "+ACC+"33",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:13,color:ACC}}>
                    {"שעות רשומות ב-"+selMonth+": "+monthHrsCount+"ש (יופיע בחשבונית)"}
                  </div>
                )}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={function(){setShowCreate(false);}} style={{background:SUB,border:"1px solid "+BDR,borderRadius:8,padding:"8px 14px",color:MUT,fontSize:13,cursor:"pointer"}}>{"ביטול"}</button>
                  <Btn onClick={create} pad="8px 20px" fs={13}>Create Invoice v</Btn>
                </div>
              </div>
            ):(
              <div style={{background:AMBLO,border:"1px solid "+AMB+"33",borderRadius:8,padding:12,fontSize:13,color:AMB}}>No monthly fee set. Edit client to add a fee.</div>
            )}
          </div>
        )}
        <div>
          {invoices.length===0?(
            <div style={{padding:40,textAlign:"center"}}><p style={{color:MUT}}>No invoices yet</p><p style={{fontSize:12,color:MUT,marginTop:4}}>Click "+ חשבונית חדשה" to create</p></div>
          ):(
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:BG}}>{["מספר חשבונית","תאריך","סכום","מעמ","סהכ","סטטוס",""].map(function(h){return <th key={h} style={{padding:"9px 14px",textAlign:"right",fontSize:12,color:MUT}}>{h}</th>;})}</tr></thead>
              <tbody>
                {invoices.map(function(inv){
                  return(
                    <tr key={inv.id} style={{borderBottom:"1px solid "+BDR}}>
                      <td style={{padding:"11px 14px",fontSize:13,fontWeight:700,color:ACC}}>{inv.invoiceNum}</td>
                      <td style={{padding:"11px 14px",fontSize:13,color:MUT}}>{inv.date}</td>
                      <td style={{padding:"11px 14px",fontSize:13,color:TXT}}>{fmtMoney(inv.subtotal)}</td>
                      <td style={{padding:"11px 14px",fontSize:13,color:MUT}}>{fmtMoney(inv.vatAmount)}</td>
                      <td style={{padding:"11px 14px",fontSize:14,fontWeight:800,color:GRN}}>{fmtMoney(inv.total)}</td>
                      <td style={{padding:"11px 14px"}}><div style={{display:"flex",gap:5}}><Bdg color={inv.paid?"green":"amber"} sm>{inv.paid?"שולם":"ממתין"}</Bdg>{inv.sent&&<Bdg color="blue" sm>sent</Bdg>}</div></td>
                      <td style={{padding:"11px 14px"}}>
                        <div style={{display:"flex",gap:5}}>
                          <button onClick={function(){printInv(inv);}} style={{background:ACCLO,border:"1px solid "+ACC+"44",color:ACC,padding:"4px 10px",borderRadius:6,fontSize:12,cursor:"pointer",fontWeight:600}}>[dn] Print</button>
                          {!inv.paid&&<button onClick={function(){markPaid(inv.id);}} style={{background:GRNLO,border:"1px solid "+GRN+"33",color:GRN,padding:"4px 10px",borderRadius:6,fontSize:12,cursor:"pointer"}}>v Paid</button>}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
}

function UsersModal(p){
  var c=p.client;
  var[users,setUsers]=useState(function(){return getUsers(c.id).slice();});
  var[showAdd,setShowAdd]=useState(false);
  var[nn,setNn]=useState("");
  var[ne,setNe]=useState("");
  var[nr,setNr]=useState("עורך");
  var[err,setErr]=useState("");
  var MAX=5;
  var activeCount=users.filter(function(u){return u.active;}).length;

  function add(){
    if(!nn.trim()){setErr("שם נדרש");return;}
    if(activeCount>=MAX){setErr("מקסימום "+MAX+" משתמשים פעילים");return;}
    var u={id:Date.now(),name:nn.trim(),email:ne.trim(),role:nr,active:true,created:new Date().toLocaleDateString("he-IL")};
    CLIENT_USERS[c.id]=CLIENT_USERS[c.id]||[];
    CLIENT_USERS[c.id].push(u);
    setUsers(CLIENT_USERS[c.id].slice());
    logAct(c.id,ACTIVE_USER.name,"הוסיף משתמש",nn.trim());
    setNn("");setNe("");setErr("");setShowAdd(false);
    p.toast("משתמש "+u.name+" נוסף");
  }

  function toggle(id){
    var arr=CLIENT_USERS[c.id]||[];
    var cnt=arr.filter(function(u){return u.active&&u.id!==id;}).length;
    for(var i=0;i<arr.length;i++){
      if(arr[i].id===id){
        if(!arr[i].active&&cnt>=MAX){p.toast("מקסימום "+MAX+" users");return;}
        logAct(c.id,ACTIVE_USER.name,arr[i].active?"השבית משתמש":"הפעיל משתמש",arr[i].name);
        arr[i].active=!arr[i].active;break;
      }
    }
    setUsers(arr.slice());
  }

  return(
    <div onClick={p.onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:700,padding:20}}>
      <div dir="rtl" onClick={function(e){e.stopPropagation();}} style={{background:SURF,border:"1px solid "+BDR,borderRadius:18,width:"100%",maxWidth:500,maxHeight:"85vh",overflow:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.7)"}}>
        <div style={{padding:"20px 24px 16px",borderBottom:"1px solid "+BDR,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><h2 style={{fontSize:17,fontWeight:800,color:TXT}}>{"משתמשים - "+c.name}</h2><p style={{fontSize:12,color:MUT,marginTop:2}}>{activeCount+"/"+MAX+" פעילים"}</p></div>
          <button onClick={p.onClose} style={{background:"none",border:"none",cursor:"pointer",color:MUT,fontSize:20}}>x</button>
        </div>
        <div style={{padding:"12px 24px",borderBottom:"1px solid "+BDR}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{fontSize:13,color:MUT}}>Quota</span>
            <span style={{fontSize:13,fontWeight:700,color:activeCount>=MAX?RED:GRN}}>{activeCount+"/"+MAX}</span>
          </div>
          <div style={{background:BDR,borderRadius:999,height:5,overflow:"hidden",marginBottom:10}}>
            <div style={{width:Math.round(activeCount/MAX*100)+"%",height:"100%",background:activeCount>=MAX?RED:GRN,borderRadius:999}}/>
          </div>
          {activeCount<MAX&&<Btn onClick={function(){setShowAdd(true);}}>+ Add User</Btn>}
        </div>
        {showAdd&&(
          <div style={{padding:"14px 24px",background:CARD,borderBottom:"1px solid "+BDR}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
              <Fld label="שם מלא" value={nn} onChange={setNn} ph="ישראל ישראלי" req err={err}/>
              <Fld label="אימייל" value={ne} onChange={setNe} ph="user@mishrad.co.il" type="email"/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:13,color:MUT,display:"block",marginBottom:5}}>Role</label>
              <select value={nr} onChange={function(e){setNr(e.target.value);}} style={{width:"100%",background:BG,border:"1px solid "+BDR,borderRadius:9,padding:"10px 14px",color:TXT,fontSize:14,fontFamily:"inherit"}}>
                <option value="עורך">Editor - can upload and edit</option>
                <option value="צופה">Viewer - read only</option>
              </select>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={function(){setShowAdd(false);setErr("");}} style={{background:SUB,border:"1px solid "+BDR,borderRadius:8,padding:"8px 14px",color:MUT,fontSize:13,cursor:"pointer"}}>{"ביטול"}</button>
              <Btn onClick={add}>Add v</Btn>
            </div>
          </div>
        )}
        <div style={{padding:"12px 24px 20px"}}>
          {users.length===0?<p style={{color:MUT,textAlign:"center",padding:24}}>No users yet</p>:users.map(function(u){
            var rc=u.role==="בעלים"?"amber":u.role==="עורך"?"green":"gray";
            return(
              <div key={u.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 0",borderBottom:"1px solid "+BDR,opacity:u.active?1:0.5}}>
                <div style={{width:38,height:38,borderRadius:9,background:u.active?ACCLO:SUB,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:700,color:u.active?ACC:MUT,flexShrink:0}}>{u.name[0]}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}>
                    <span style={{fontWeight:700,color:TXT,fontSize:14}}>{u.name}</span>
                    <Bdg color={rc} sm>{u.role}</Bdg>
                    {!u.active&&<Bdg color="gray" sm>inactive</Bdg>}
                  </div>
                  <p style={{fontSize:12,color:MUT}}>{(u.email||"אין אימייל")+" | added: "+u.created}</p>
                </div>
                <button onClick={function(){toggle(u.id);}} style={{background:u.active?REDLO:GRNLO,border:"1px solid "+(u.active?RED+"33":GRN+"33"),color:u.active?RED:GRN,padding:"5px 12px",borderRadius:7,fontSize:12,cursor:"pointer",fontWeight:600}}>{u.active?"השבת":"הפעל"}</button>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ---- Billing Modal ----
function BillingModal(p){
  var c=p.client;
  var[entries,setEntries]=useState(function(){return getBilling(c.id).slice();});
  var[showAdd,setShowAdd]=useState(false);
  var[etype,setEtype]=useState("חיוב");
  var[desc,setDesc]=useState("");
  var[amt,setAmt]=useState("");
  var[date,setDate]=useState(new Date().toISOString().slice(0,10));
  var[vat,setVat]=useState(true);
  var[err,setErr]=useState("");

  var totalCharge=entries.filter(function(e){return e.type==="חיוב";}).reduce(function(s,e){return s+Number(e.amount);},0);
  var totalCredit=entries.filter(function(e){return e.type==="זיכוי";}).reduce(function(s,e){return s+Number(e.amount);},0);
  var balance=totalCharge-totalCredit;

  function addMonthly(){
    if(!c.monthlyFee)return;
    var a=Math.round(c.monthlyFee*1.18);
    var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var d=new Date();
    var entry={id:Date.now(),date:d.toISOString().slice(0,10),type:"חיוב",desc:"שכר טרחה - "+months[d.getMonth()]+" "+d.getFullYear(),amount:a,vat:true,status:"ממתין"};
    BILLING[c.id]=BILLING[c.id]||[];
    BILLING[c.id].unshift(entry);
    logAct(c.id,ACTIVE_USER.name,"חיוב חודשי נוצר",fmtMoney(a));
    setEntries(BILLING[c.id].slice());
    p.toast("חיוב חודשי נוצר: "+fmtMoney(a));
  }

  function save(){
    if(!desc.trim()){setErr("נדרש תיאור");return;}
    if(!amt||isNaN(Number(amt))||Number(amt)<=0){setErr("נדרש סכום תקין");return;}
    var finalAmt=vat&&etype==="חיוב"?Math.round(Number(amt)*1.18):Number(amt);
    var entry={id:Date.now(),date:date,type:etype,desc:desc.trim(),amount:finalAmt,vat:vat&&etype==="חיוב",status:etype==="זיכוי"?"זיכוי":"ממתין"};
    BILLING[c.id]=BILLING[c.id]||[];
    BILLING[c.id].unshift(entry);
    logAct(c.id,ACTIVE_USER.name,etype==="זיכוי"?"זיכוי נוסף":"חיוב נוסף",fmtMoney(finalAmt));
    setEntries(BILLING[c.id].slice());
    setDesc("");setAmt("");setErr("");setShowAdd(false);
    p.toast((etype==="זיכוי"?"זיכוי":"חיוב")+" נוסף");
  }

  function markPaid(id){
    var arr=BILLING[c.id]||[];
    for(var i=0;i<arr.length;i++){if(arr[i].id===id){arr[i].status="שולם";break;}}
    setEntries(arr.slice());
    logAct(c.id,ACTIVE_USER.name,"סומן כשולם","entry #"+id);
    p.toast("סומן כשולם");
  }

  function cancel(id){
    var arr=BILLING[c.id]||[];
    for(var i=0;i<arr.length;i++){if(arr[i].id===id){arr[i].status="בוטל";break;}}
    setEntries(arr.slice());
    p.toast("רשומה בוטלה");
  }

  return(
    <div onClick={p.onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:600,padding:20}}>
      <div dir="rtl" onClick={function(e){e.stopPropagation();}} style={{background:SURF,border:"1px solid "+BDR,borderRadius:18,width:"100%",maxWidth:700,maxHeight:"90vh",overflow:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.7)"}}>
        <div style={{padding:"20px 26px 16px",borderBottom:"1px solid "+BDR,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:SURF,zIndex:1}}>
          <div><h2 style={{fontSize:17,fontWeight:800,color:TXT}}>{"כרטסת - "+c.name}</h2><p style={{fontSize:12,color:MUT,marginTop:2}}>{c.caseNum+(c.monthlyFee?" | שכט חודשי: "+fmtMoney(c.monthlyFee):"")}</p></div>
          <button onClick={p.onClose} style={{background:"none",border:"none",cursor:"pointer",color:MUT,fontSize:20}}>x</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,padding:"16px 26px",borderBottom:"1px solid "+BDR}}>
          <div style={{background:CARD,borderRadius:9,padding:"11px 14px"}}><p style={{fontSize:12,color:MUT,marginBottom:3}}>{"סהכ חיובים"}</p><p style={{fontSize:18,fontWeight:800,color:RED}}>{fmtMoney(totalCharge)}</p></div>
          <div style={{background:CARD,borderRadius:9,padding:"11px 14px"}}><p style={{fontSize:12,color:MUT,marginBottom:3}}>{"סהכ זיכויים"}</p><p style={{fontSize:18,fontWeight:800,color:GRN}}>{fmtMoney(totalCredit)}</p></div>
          <div style={{background:balance>0?REDLO:GRNLO,borderRadius:9,padding:"11px 14px",border:"1px solid "+(balance>0?RED+"33":GRN+"33")}}><p style={{fontSize:12,color:MUT,marginBottom:3}}>{"יתרה לתשלום"}</p><p style={{fontSize:18,fontWeight:800,color:balance>0?RED:GRN}}>{fmtMoney(Math.abs(balance))+(balance<0?" זיכוי":"")}</p></div>
        </div>
        <div style={{padding:"12px 26px",borderBottom:"1px solid "+BDR,display:"flex",gap:8,flexWrap:"wrap"}}>
          {c.monthlyFee>0&&<Btn bg={"linear-gradient(135deg,"+GRNLO+","+GRN+")"} onClick={addMonthly} pad="8px 14px" fs={12}>{"חודשי ("+fmtMoney(Math.round(c.monthlyFee*1.18))+")"}</Btn>}
          <button onClick={function(){setEtype("חיוב");setShowAdd(true);}} style={{background:REDLO,border:"1px solid "+RED+"33",borderRadius:7,padding:"8px 14px",color:RED,fontWeight:600,fontSize:13,cursor:"pointer"}}>{"+ חיוב"}</button>
          <button onClick={function(){setEtype("זיכוי");setShowAdd(true);}} style={{background:GRNLO,border:"1px solid "+GRN+"33",borderRadius:7,padding:"8px 14px",color:GRN,fontWeight:600,fontSize:13,cursor:"pointer"}}>{"+ זיכוי"}</button>
        </div>
        {showAdd&&(
          <div style={{padding:"16px 26px",background:CARD,borderBottom:"1px solid "+BDR}}>
            <p style={{fontSize:13,fontWeight:700,color:etype==="חיוב"?RED:GRN,marginBottom:12}}>{etype==="חיוב"?"הוסף חיוב":"הוסף זיכוי"}</p>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:"0 10px"}}>
              <Fld label="תיאור" value={desc} onChange={setDesc} ph={etype==="חיוב"?"שכר טרחה - ינואר 2024":"זיכוי יתר תשלום"} err={err}/>
              <Fld label="סכום (שח)" value={amt} onChange={setAmt} ph="5000" type="number"/>
              <Fld label="תאריך" value={date} onChange={setDate} type="date"/>
            </div>
            {etype==="חיוב"&&(
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,marginTop:-6}}>
                <input type="checkbox" checked={vat} onChange={function(e){setVat(e.target.checked);}} id="vat_chk" style={{cursor:"pointer"}}/>
                <label htmlFor="vat_chk" style={{fontSize:13,color:MUT,cursor:"pointer"}}>Add VAT 18%</label>
                {amt&&!isNaN(Number(amt))&&vat&&<span style={{fontSize:13,color:AMB}}>{"סהכ עם מעמ: "+fmtMoney(Math.round(Number(amt)*1.18))}</span>}
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button onClick={function(){setShowAdd(false);setDesc("");setAmt("");setErr("");}} style={{background:SUB,border:"1px solid "+BDR,borderRadius:7,padding:"7px 14px",color:MUT,fontSize:13,cursor:"pointer"}}>{"ביטול"}</button>
              <button onClick={save} style={{background:etype==="חיוב"?RED:GRN,border:"none",borderRadius:7,padding:"7px 18px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>{etype==="חיוב"?"שמור חיוב":"שמור זיכוי"}</button>
            </div>
          </div>
        )}
        <div>
          {entries.length===0?(
            <div style={{padding:40,textAlign:"center"}}><p style={{fontSize:28,marginBottom:8}}>-</p><p style={{color:MUT}}>No entries yet</p></div>
          ):(
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:BG}}>{["תאריך","תיאור","סוג","סכום","מעמ","סטטוס",""].map(function(h){return <th key={h} style={{padding:"9px 16px",textAlign:"right",fontSize:12,color:MUT}}>{h}</th>;})}</tr></thead>
              <tbody>
                {entries.map(function(e){
                  var isC=e.type==="חיוב";
                  return(
                    <tr key={e.id} style={{borderBottom:"1px solid "+BDR}}>
                      <td style={{padding:"11px 16px",fontSize:13,color:MUT}}>{e.date}</td>
                      <td style={{padding:"11px 16px",fontSize:14,color:TXT}}>{e.desc}</td>
                      <td style={{padding:"11px 16px"}}><Bdg color={isC?"red":"green"} sm>{isC?"חיוב":"זיכוי"}</Bdg></td>
                      <td style={{padding:"11px 16px",fontSize:14,fontWeight:700,color:isC?RED:GRN}}>{(isC?"":"-")+fmtMoney(e.amount)}</td>
                      <td style={{padding:"11px 16px",fontSize:12,color:MUT}}>{e.vat?"כולל":"-"}</td>
                      <td style={{padding:"11px 16px"}}><Bdg color={e.status==="שולם"?"green":e.status==="זיכוי"?"blue":e.status==="בוטל"?"gray":"amber"} sm>{e.status}</Bdg></td>
                      <td style={{padding:"11px 16px"}}>
                        <div style={{display:"flex",gap:5}}>
                          {e.status==="ממתין"&&<button onClick={function(){markPaid(e.id);}} style={{background:GRNLO,border:"1px solid "+GRN+"33",color:GRN,padding:"4px 9px",borderRadius:5,fontSize:12,cursor:"pointer"}}>v paid</button>}
                          {e.status==="ממתין"&&<button onClick={function(){cancel(e.id);}} style={{background:SUB,border:"1px solid "+BDR,color:MUT,padding:"4px 9px",borderRadius:5,fontSize:12,cursor:"pointer"}}>cancel</button>}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
}

// ---- Document Generator ----
function DocGen(p){
  var c=p.client;
  var firm=p.firm;
  var[toName,setToName]=useState("");
  var[toTitle,setToTitle]=useState("מנכל");
  var[subject,setSubject]=useState(c.name+" - "+c.caseNum);
  var[paras,setParas]=useState([""]);
  var[preview,setPreview]=useState(false);
  var[aiPanel,setAiPanel]=useState(false);
  var[aiLoading,setAiLoading]=useState(false);
  var[aiMsg,setAiMsg]=useState("");
  var[aiChat,setAiChat]=useState([]);
  var[aiTemplate,setAiTemplate]=useState("");
  var today=new Date().toLocaleDateString("he-IL",{day:"numeric",month:"long",year:"numeric"});

  var AI_TEMPLATES=[
    {id:"fine",label:"ביטול קנס",icon:"[X]",desc:"בקשה לביטול קנס מס הכנסה / מעמ",
     prompt:"כתוב מכתב מקצועי בעברית לביטול קנס לרשות המסים. הלקוח הוא "+c.name+" (ת.ז./ח.פ. "+c.caseNum+"). כלול: פנייה מנומסת, הצגת הנסיבות, בקשה לביטול או הפחתת הקנס לפי סעיף 100א לפקודת מס הכנסה. כתוב 3-4 פסקאות מקצועיות בשפה משפטית-חשבונאית."},
    {id:"extension",label:"בקשת ארכה",icon:"[T]",desc:"בקשה לדחיית מועד הגשה / תשלום",
     prompt:"כתוב מכתב מקצועי בעברית לבקשת ארכה להגשת דוחות / תשלום מס. הלקוח הוא "+c.name+" (ת.ז./ח.פ. "+c.caseNum+"). כלול: נימוק מקצועי לצורך הארכה, הצגת נסיבות, בקשה ספציפית לתקופת הארכה הנדרשת. כתוב 3 פסקאות בשפה משפטית."},
    {id:"withholding",label:"פטור ניכוי מס במקור",icon:"[W]",desc:"בקשה לאישור פטור / הפחתת ניכוי מס",
     prompt:"כתוב מכתב מקצועי בעברית לבקשת פטור מניכוי מס במקור לפי סעיף 164 לפקודת מס הכנסה. הלקוח הוא "+c.name+" (ת.ז./ח.פ. "+c.caseNum+"). כלול: הצגת פרטי העסק, נסיבות התיק, בסיס משפטי לבקשת הפטור, ובקשה לאישור. כתוב 3-4 פסקאות."},
    {id:"appeal",label:"השגה על שומה",icon:"[A]",desc:"מכתב השגה על שומת מס / החלטת רשות",
     prompt:"כתוב מכתב השגה מקצועי בעברית על שומת מס הכנסה. הלקוח הוא "+c.name+" (ת.ז./ח.פ. "+c.caseNum+"). כלול: פתיחה פורמלית, טיעונים משפטיים-חשבונאיים, הפניה לפסיקה רלוונטית, ובקשה לביטול השומה. כתוב 4 פסקאות בשפה משפטית מוקפדת."},
    {id:"custom",label:"מכתב חופשי",icon:"[C]",desc:"תיאור חופשי - AI יכתוב לפי הנחיותיך",
     prompt:""},
  ];

  function sendAi(){
    if(!aiMsg.trim()&&!aiTemplate)return;
    var tmpl=null;for(var i=0;i<AI_TEMPLATES.length;i++){if(AI_TEMPLATES[i].id===aiTemplate){tmpl=AI_TEMPLATES[i];break;}}
    var userPrompt=aiMsg.trim()||(tmpl&&tmpl.label)||"";
    var systemPrompt="אתה עוזר משפטי-חשבונאי מקצועי. כתוב תוכן מכתבים בעברית, בשפה פורמלית ומקצועית. החזר רק את תוכן הפסקאות של המכתב (ללא כותרת, ללא פתיחה ללא חתימה - רק גוף המכתב). כל פסקה תהיה ממוספרת ומופרדת.";
    var finalPrompt=(tmpl&&tmpl.id!=="custom")?tmpl.prompt+(aiMsg.trim()?" נוסף: "+aiMsg.trim():""):aiMsg.trim();
    var newChat=aiChat.concat([{role:"user",content:userPrompt||tmpl.label}]);
    setAiChat(newChat);
    setAiLoading(true);
    setAiMsg("");
    // יצירת תוכן מקומי לפי תבנית
    setTimeout(function(){
      var reply="";
      if(tmpl&&tmpl.id==="cancellation"){
        reply="אנו פונים אליכם בעניין הקנס שהוטל על מרשנו "+c.name+" (ח.פ./ת.ז. "+c.caseNum+"), ומבקשים לבטלו או להפחיתו בהתאם לסמכותכם לפי סעיף 100א לפקודת מס הכנסה.\n\nהמדובר בהפרה ראשונה של מרשנו, אשר עד כה עמד בכל חובותיו החוקיות באופן מלא ובמועד. הפיגור שיצר את הקנס נבע מנסיבות חריגות ובלתי צפויות אשר אינן בשליטתו.\n\nלאור כל האמור לעיל, אנו מתכבדים לבקש את ביטול הקנס המוטל, וזאת בהתחשב בנסיבות האישיות של מרשנו, בהתנהגותו החיובית עד כה ובחוסר הכוונה להפר את הוראות החוק.";
      } else if(tmpl&&tmpl.id==="extension"){
        reply="אנו פונים בבקשה לאריכת המועד להגשת הדוח / תשלום המס עבור מרשנו "+c.name+" (ח.פ./ת.ז. "+c.caseNum+").\n\nהסיבה לבקשה נעוצה בקשיים אובייקטיביים שנתקל בהם מרשנו בתקופה האחרונה, אשר מנעו ממנו לעמוד במועד שנקבע. מרשנו מתחייב להגיש את הדוח ולשלם את המס בתוך המועד המבוקש.\n\nלאור האמור לעיל, נבקש להאריך את המועד בשלושים יום נוספים, ונשמח לספק כל מסמך נוסף הנדרש לצורך בחינת הבקשה.";
      } else if(tmpl&&tmpl.id==="exemption"){
        reply="אנו מגישים בקשה לפטור מניכוי מס במקור עבור מרשנו "+c.name+" (ח.פ./ת.ז. "+c.caseNum+"), בהתאם להוראות סעיף 164 לפקודת מס הכנסה.\n\nמרשנו עוסק ב_____ ומחזור עסקיו הצפוי לשנת המס הינו _____ שקלים. על בסיס הערכות מס הכנסה לשנים קודמות, מס הכנסה הצפוי אינו מצדיק ניכוי מס במקור.\n\nבנסיבות אלה, אנו מבקשים לאשר פטור מניכוי מס במקור למרשנו לתקופה של שנה אחת, ומצרפים את כל המסמכים הנדרשים לתמיכה בבקשה זו.";
      } else if(tmpl&&tmpl.id==="appeal"){
        reply="הננו מגישים בזאת השגה על שומת מס הכנסה שהוצאה למרשנו "+c.name+" (ח.פ./ת.ז. "+c.caseNum+"), לשנת המס _____.\n\nלטענת מרשנו, השומה שהוצאה אינה משקפת את המציאות העסקית הנכונה, ונפלו בה טעויות מהותיות בחישוב ההכנסה החייבת. בפרט, לא הובאו בחשבון הוצאות לגיטימיות ומוכרות על פי דין, כגון הוצאות תפעוליות, פחת ועלות מכר.\n\nלאור האמור, אנו מבקשים כי תבדק השומה מחדש ותתוקן בהתאם למסמכים ולנתונים שיוגשו.";
      } else {
        reply=(finalPrompt||"נא לכתוב כאן את תוכן המכתב הרצוי.");
      }
      var updated=newChat.concat([{role:"assistant",content:reply}]);
      setAiChat(updated);
      var rawParas=reply.split("\n\n").map(function(s){return s.trim();}).filter(function(s){return s.length>10;});
      if(rawParas.length>0){setParas(rawParas);}
      if(subject===""+c.name+" - "+c.caseNum&&tmpl&&tmpl.id!=="custom"){setSubject(tmpl.label+" - "+c.name);}
      setAiLoading(false);
    },800);
  }

  function addPara(){setParas(function(pp){return pp.concat([""]);});}
  function updPara(i,v){setParas(function(pp){var n=pp.slice();n[i]=v;return n;});}
  function remPara(i){if(paras.length<=1)return;setParas(function(pp){return pp.filter(function(_,idx){return idx!==i;});});}

  function buildText(){
    var lines=[];
    lines.push(today);lines.push("");
    lines.push("לכבוד: "+(toName||"___"));
    lines.push(toTitle);lines.push("");
    lines.push("");
    lines.push("הנדון: "+c.name+" - ת.ז./ח.פ. "+c.caseNum);lines.push("");
    lines.push("בשם מרשי "+c.name+",");
    lines.push("אנו מתכבדים לפנות אליכם בדברים כדלקמן:");lines.push("");
    for(var i=0;i<paras.length;i++){if(paras[i].trim()){lines.push((i+1)+". "+paras[i]);lines.push("");}}
    lines.push("בכבוד רב,");
    lines.push(firm.firmName||"המשרד");
    if(firm.phone)lines.push(firm.phone);
    if(firm.email)lines.push(firm.email);
    return lines.join("\n");
  }

  function download(){
    var text=buildText();
    var blob=new Blob([text],{type:"text/plain;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var link=window.document.createElement("a");
    var fname=subject.trim().split("").filter(function(c){return /[a-zA-Z0-9 ]/.test(c)||c>="א"&&c<="ת";}).join("").slice(0,40)||c.name;
    link.href=url;link.download=fname+".txt";link.click();
    URL.revokeObjectURL(url);
    // Save to client docs folder
    var docEntry={
      id:Date.now(),
      name:fname+".txt",
      size:Math.round(text.length/1024*10)/10+"KB",
      date:new Date().toISOString().slice(0,10),
      ver:1,
      sens:"פנימי",
      content:text,
      generated:true,
    };
    saveClientDoc(c.id,"התכתבויות",docEntry);
    logAct(c.id,ACTIVE_USER.name,"מכתב נוצר ונשמר",fname+".txt");
    p.toast("המכתב הורד ונשמר בתיק הלקוח");
    if(p.onSaved)p.onSaved();
  }

  function saveOnly(){
    var text=buildText();
    var fname=subject.trim().split("").filter(function(c){return /[a-zA-Z0-9 ]/.test(c)||c>="א"&&c<="ת";}).join("").slice(0,40)||c.name;
    var docEntry={
      id:Date.now(),
      name:fname+".txt",
      size:Math.round(text.length/1024*10)/10+"KB",
      date:new Date().toISOString().slice(0,10),
      ver:1,
      sens:"פנימי",
      content:text,
      generated:true,
    };
    saveClientDoc(c.id,"התכתבויות",docEntry);
    logAct(c.id,ACTIVE_USER.name,"מכתב נשמר בתיק",fname+".txt");
    p.toast("המכתב נשמר בתיק הלקוח");
    if(p.onSaved)p.onSaved();
  }

  return(
    <div onClick={p.onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:700,padding:20}}>
      <div dir="rtl" onClick={function(e){e.stopPropagation();}} style={{background:SURF,border:"1px solid "+BDR,borderRadius:18,width:"100%",maxWidth:820,maxHeight:"92vh",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 24px 80px rgba(0,0,0,0.8)"}}>
        <div style={{padding:"18px 26px 14px",borderBottom:"1px solid "+BDR,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div><h2 style={{fontSize:17,fontWeight:800,color:TXT}}>{"מחולל מסמכים - "+c.name}</h2><p style={{fontSize:12,color:MUT,marginTop:2}}>{"מכתב משפטי מקצועי"}</p></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={function(){setAiPanel(function(x){return !x;});setPreview(false);}} style={{background:aiPanel?"linear-gradient(135deg,#2a1f5c,#6d28d9)":SUB,border:"1px solid "+(aiPanel?"#6d28d9":BDR),borderRadius:7,padding:"6px 12px",color:aiPanel?"#c4b5fd":MUT,fontSize:13,cursor:"pointer",fontWeight:700}}>{"AI כתיבה"}</button>
            <button onClick={function(){setPreview(function(pp){return !pp;});setAiPanel(false);}} style={{background:preview?ACCLO:SUB,border:"1px solid "+(preview?ACC:BDR),borderRadius:7,padding:"6px 12px",color:preview?ACC:MUT,fontSize:13,cursor:"pointer",fontWeight:600}}>{preview?"עריכה":"תצוגה מקדימה"}</button>
            <button onClick={saveOnly} style={{background:GRNLO,border:"1px solid "+GRN+"44",borderRadius:7,padding:"6px 12px",color:GRN,fontSize:13,cursor:"pointer",fontWeight:600}}>{"שמור בתיק"}</button>
            <Btn onClick={download} pad="6px 14px" fs={12}>{"הורד + שמור"}</Btn>
            <button onClick={p.onClose} style={{background:"none",border:"none",cursor:"pointer",color:MUT,fontSize:18}}>x</button>
          </div>
        </div>
        <div style={{display:"flex",flex:1,overflow:"hidden"}}>
          {aiPanel&&(
            <div style={{width:340,borderLeft:"1px solid "+BDR,display:"flex",flexDirection:"column",background:BG,flexShrink:0}}>
              <div style={{padding:"14px 16px",borderBottom:"1px solid "+BDR}}>
                <p style={{fontSize:13,fontWeight:800,color:"#c4b5fd",marginBottom:10}}>{"AI - בחר תבנית"}</p>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {AI_TEMPLATES.map(function(t){
                    var sel=aiTemplate===t.id;
                    return(
                      <button key={t.id} onClick={function(){setAiTemplate(t.id);}}
                        style={{background:sel?"#2a1f5c":CARD,border:"1px solid "+(sel?"#6d28d9":BDR),borderRadius:8,padding:"9px 12px",textAlign:"right",cursor:"pointer",display:"flex",gap:9,alignItems:"center"}}>

function FilingsClientTab(p){
  var c=p.client;
  var[year,setYear]=useState(String(new Date().getFullYear()));
  var[settings,setSettings]=useState(function(){
    var s=getFilingSettings(c.id);
    return {vatFreq:s.vatFreq||"monthly",taxAdvEnabled:s.taxAdvEnabled||false,taxAdvFreq:s.taxAdvFreq||"monthly",taxDeductEnabled:s.taxDeductEnabled||false,taxDeductFreq:s.taxDeductFreq||"monthly",niiDeductEnabled:s.niiDeductEnabled||false,niiDeductFreq:s.niiDeductFreq||"monthly"};
  });
  var[filings,setFilings]=useState(function(){
    var ex=getFilings(c.id);
    if(ex.length===0){var gen=generateFilingSchedule(c.id,Number(year));FILINGS[c.id]=gen;return gen.slice();}
    return ex.slice();
  });
  var[editSettings,setEditSettings]=useState(false);
  var[filterType,setFilterType]=useState("all");
  var[sortKey,setSortKey]=useState("period");
  var[sortDir,setSortDir]=useState(1);
  var today=new Date().toISOString().slice(0,10);

  function saveSettings(){
    FILING_SETTINGS[c.id]=Object.assign({},settings);
    var gen=generateFilingSchedule(c.id,Number(year));
    var existMap={};(FILINGS[c.id]||[]).forEach(function(e){existMap[e.id]=e;});
    var merged=gen.map(function(f){return existMap[f.id]||f;});
    FILINGS[c.id]=merged;setFilings(merged.slice());setEditSettings(false);
    p.toast("הגדרות הגשות נשמרו");
  }

  function markFiled(id){
    var arr=FILINGS[c.id]||[];
    for(var i=0;i<arr.length;i++){if(arr[i].id===id){arr[i].status="filed";arr[i].filedDate=today;break;}}
    cancelAutoTaskForFiling(id);
    setFilings(arr.slice());logAct(c.id,ACTIVE_USER.name,"הגשה בוצעה",id);p.toast("הוגש");
  }
  function markPending(id){
    var arr=FILINGS[c.id]||[];
    for(var i=0;i<arr.length;i++){if(arr[i].id===id){arr[i].status="pending";arr[i].filedDate="";break;}}
    setFilings(arr.slice());
  }

  var pending=filings.filter(function(f){return f.status==="pending"&&f.due>=today;}).length;
  var late=filings.filter(function(f){return f.status==="pending"&&f.due<today;}).length;
  var filed=filings.filter(function(f){return f.status==="filed";}).length;

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{display:"flex",gap:10}}>
          <div style={{background:GRNLO,border:"1px solid "+GRN+"33",borderRadius:8,padding:"8px 14px",textAlign:"center"}}>
            <p style={{fontSize:18,fontWeight:800,color:GRN}}>{filed}</p><p style={{fontSize:11,color:MUT}}>{"הוגש"}</p>
          </div>
          <div style={{background:AMBLO,border:"1px solid "+AMB+"33",borderRadius:8,padding:"8px 14px",textAlign:"center"}}>
            <p style={{fontSize:18,fontWeight:800,color:AMB}}>{pending}</p><p style={{fontSize:11,color:MUT}}>{"ממתין"}</p>
          </div>
          <div style={{background:late>0?REDLO:CARD,border:"1px solid "+(late>0?RED+"33":BDR),borderRadius:8,padding:"8px 14px",textAlign:"center"}}>
            <p style={{fontSize:18,fontWeight:800,color:late>0?RED:MUT}}>{late}</p><p style={{fontSize:11,color:MUT}}>{"באיחור"}</p>
          </div>
        </div>
        <button onClick={function(){setEditSettings(function(x){return !x;});}}
          style={{background:AMBLO,border:"1px solid "+AMB+"44",borderRadius:7,padding:"7px 13px",color:AMB,fontSize:12,cursor:"pointer",fontWeight:600}}>
          {"הגדרות הגשות"}
        </button>
      </div>
      {editSettings&&(
        <div style={{background:CARD,border:"1px solid "+AMB+"44",borderRadius:10,padding:16,marginBottom:12}}>
          <p style={{fontSize:13,fontWeight:700,color:AMB,marginBottom:12}}>{"הגדרות הגשות"}</p>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,color:MUT,display:"block",marginBottom:6}}>{"תדירות מעמ"}</label>
            <div style={{display:"flex",gap:8}}>
              {[["monthly","חודשי"],["bimonthly","דו-חודשי"]].map(function(opt){
                return <button key={opt[0]} onClick={function(){setSettings(function(s){return Object.assign({},s,{vatFreq:opt[0]});});}}
                  style={{padding:"7px 14px",borderRadius:7,fontSize:13,fontWeight:700,background:settings.vatFreq===opt[0]?ACC:SUB,color:settings.vatFreq===opt[0]?"#fff":MUT,border:"none",cursor:"pointer"}}>{opt[1]}</button>;
              })}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            {[["taxAdvEnabled","taxAdvFreq","מקדמות מ.ה."],["taxDeductEnabled","taxDeductFreq","ניכויים מ.ה."],["niiDeductEnabled","niiDeductFreq","ניכויים ב.ל."]].map(function(opt){
              var ena=settings[opt[0]];
              return(
                <div key={opt[0]} style={{background:ena?ACCLO:SUB,border:"1px solid "+(ena?ACC:BDR),borderRadius:9,padding:"10px 12px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:ena?8:0}}>
                    <div style={{display:"flex",gap:7,alignItems:"center",cursor:"pointer"}} onClick={function(){setSettings(function(s){var n=Object.assign({},s);n[opt[0]]=!n[opt[0]];return n;});}}>
                      <div style={{width:16,height:16,borderRadius:3,background:ena?ACC:BDR,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",flexShrink:0}}>{ena?"v":""}</div>
                      <span style={{fontSize:13,fontWeight:700,color:ena?ACC:MUT}}>{opt[2]}</span>
                    </div>
                    {ena&&<span style={{fontSize:11,color:MUT}}>{"תדירות:"}</span>}
                  </div>
                  {ena&&(
                    <div style={{display:"flex",gap:6}}>
                      {[["monthly","חודשי"],["bimonthly","דו-חודשי"]].map(function(fr){
                        var sel=settings[opt[1]]===fr[0];
                        return <button key={fr[0]} onClick={function(){setSettings(function(s){var n=Object.assign({},s);n[opt[1]]=fr[0];return n;});}}
                          style={{flex:1,padding:"5px 0",borderRadius:6,fontSize:12,fontWeight:sel?700:400,background:sel?ACC:BDR,color:sel?"#fff":MUT,border:"none",cursor:"pointer"}}>{fr[1]}</button>;
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={function(){setEditSettings(false);}} style={{background:SUB,border:"1px solid "+BDR,borderRadius:7,padding:"7px 14px",color:MUT,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{"ביטול"}</button>
            <button onClick={saveSettings} style={{background:ACC,border:"none",borderRadius:7,padding:"7px 16px",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>{"שמור"}</button>
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {[
          ["all","הכל","📂"],
          ["vat","מעמ","🧾"],
          ["taxAdv","מקדמות","📅"],
          ["taxDeduct","ניכויים מ.ה.","🏛"],
          ["niiDeduct","ניכויים ב.ל.","🛡"],
        ].map(function(f){
          var a=filterType===f[0];
          return(
            <button key={f[0]} onClick={function(){setFilterType(f[0]);}}
              style={{
                display:"flex",alignItems:"center",gap:6,
                padding:"8px 15px",borderRadius:10,fontSize:13,fontWeight:a?700:500,
                background:a?"linear-gradient(135deg,"+ACC+",#2980d9)":CARD,
                border:"1px solid "+(a?ACC:BDR),
                color:a?"#fff":MUT,
                cursor:"pointer",
                boxShadow:a?"0 3px 10px rgba(59,130,246,0.3)":"none",
              }}>
              <span style={{fontSize:15,lineHeight:1}}>{f[2]}</span>
              <span>{f[1]}</span>
            </button>
          );
        })}
      </div>
            {(function(){
        var statusOrder={"filed":2,"pending":0,"late":1};
        var filtered2=filterType==="all"?filings:filings.filter(function(f){return f.type===filterType;});
        var sorted=filtered2.slice().sort(function(a,b){
          var va="",vb="";
          if(sortKey==="period"){va=a.due;vb=b.due;}
          else if(sortKey==="due"){va=a.due;vb=b.due;}
          else if(sortKey==="type"){va=getFilingLabel(a.type);vb=getFilingLabel(b.type);}
          else if(sortKey==="status"){va=a.status;vb=b.status;}
          else if(sortKey==="filedDate"){va=a.filedDate||"";vb=b.filedDate||"";}
          return va<vb?-sortDir:va>vb?sortDir:0;
        });
        if(sorted.length===0)return <p style={{color:MUT,textAlign:"center",padding:24}}>{"אין הגשות - הגדר הגשות לעיל"}</p>;

        function SortTh(props){
          var active=sortKey===props.k;
          return <th onClick={function(){if(active)setSortDir(function(d){return -d;});else{setSortKey(props.k);setSortDir(1);}}}
            style={{padding:"9px 12px",textAlign:"right",fontSize:12,fontWeight:active?700:500,color:active?ACC:MUT,cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",background:active?ACCLO:"transparent"}}>
            {props.label}
            <span style={{marginRight:4,fontSize:10,opacity:active?1:0}}>{sortDir===1?"▲":"▼"}</span>
          </th>;
        }

        return(
          <div style={{background:CARD,border:"1px solid "+BDR,borderRadius:10,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:BG}}>
                <SortTh k="type" label="סוג"/>
                <SortTh k="period" label="תקופה"/>
                <SortTh k="due" label="מועד הגשה"/>
                <SortTh k="status" label="סטטוס"/>
                <SortTh k="filedDate" label="תאריך הגשה"/>
                <th style={{padding:"9px 12px"}}/>
              </tr></thead>
              <tbody>
                {sorted.map(function(f){
                  var isLate=f.status!=="filed"&&f.due<today;
                  var statusColor=f.status==="filed"?"green":isLate?"red":"amber";
                  var statusLabel=f.status==="filed"?"הוגש":isLate?"באיחור":"ממתין";
                  return(
                    <tr key={f.id} style={{borderBottom:"1px solid "+BDR,background:isLate?REDLO+"33":"transparent"}}>
                      <td style={{padding:"9px 12px"}}><Bdg color={getFilingColor(f.type)} sm>{getFilingLabel(f.type)}</Bdg></td>
                      <td style={{padding:"9px 12px",fontSize:12,color:TXT}}>{f.period}</td>
                      <td style={{padding:"9px 12px",fontSize:12,color:isLate?RED:MUT,fontWeight:isLate?700:400}}>{f.due}</td>
                      <td style={{padding:"9px 12px"}}><Bdg color={statusColor} sm>{statusLabel}</Bdg></td>
                      <td style={{padding:"9px 12px",fontSize:11,color:MUT}}>{f.filedDate||"-"}</td>
                      <td style={{padding:"9px 12px"}}>
                        {f.status!=="filed"
                          ?<button onClick={function(){markFiled(f.id);}} style={{background:GRNLO,border:"1px solid "+GRN+"33",color:GRN,padding:"4px 10px",borderRadius:6,fontSize:12,cursor:"pointer",fontWeight:600}}>{"v הוגש"}</button>
                          :<button onClick={function(){markPending(f.id);}} style={{background:SUB,border:"1px solid "+BDR,color:MUT,padding:"4px 8px",borderRadius:6,fontSize:11,cursor:"pointer"}}>{"אפס"}</button>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        );
      })()}
    </div>
  );
}
